    // Palácio do TJTO ao fundo (parallax lento)
    const bx = (ARENA_X - camX) * 0.5 + 40;
    drawTJTO(bx, GROUND_Y);
    // colunas de tijolo fechando a arena nas laterais
    for (const wx of [ARENA_X, LEVEL_W - 18]) {
      const sx = wx - camX;
      px(sx, GROUND_Y - 96, 18, 96, '#b5502a');
      px(sx, GROUND_Y - 96, 18, 3, '#d97a4a');
      px(sx, GROUND_Y - 96, 2, 96, '#7a2e14'); px(sx + 16, GROUND_Y - 96, 2, 96, '#7a2e14');
      ctx.fillStyle = '#7a2e14';
      for (let y = GROUND_Y - 92; y < GROUND_Y; y += 8) ctx.fillRect(sx, y, 18, 1);
    }
  } else {
    drawFieldBackground();
  }
}

// cenário do cerrado/Tocantins (céu de fim de tarde + camadas com parallax),
// compartilhado entre a fase do Game 1 e o Game 2 (mesma identidade visual)
function drawFieldBackground() {
  const bands = ['#ffe07a', '#ffce5a', '#ffb45a', '#f59a5e', '#e88a6a'];
  for (let i = 0; i < bands.length; i++) { ctx.fillStyle = bands[i]; ctx.fillRect(0, i * (H / bands.length), W, H / bands.length + 1); }
  // sol fixo no céu (posição estável, sem tremer)
  ctx.fillStyle = '#fff0b0'; ctx.beginPath(); ctx.arc(W * 0.725, 56, 28, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffe066'; ctx.beginPath(); ctx.arc(W * 0.725, 56, 22, 0, Math.PI * 2); ctx.fill();
  // camadas de fundo (da mais distante para a mais próxima)
  drawBgClouds();
  drawAraras();
  drawFarBuildings();
  drawBgHills();
  drawBgHouses();
  drawBgCoqueiros();
  drawBgBushes();
}

// pseudo-aleatório determinístico (para estados fixos, ex.: luzes acesas)
function hash1(n) { const s = Math.sin(n * 12.9898) * 43758.5453; return s - Math.floor(s); }

function drawBgClouds() {
  const para = camX * 0.4, unit = 170;
  const first = Math.floor(para / unit) - 1;
  for (let k = first; k < first + Math.ceil(W / unit) + 2; k++) {
    const idx = ((k % 3) + 3) % 3;
    drawCloud(Math.floor(k * unit - para), 20 + idx * 18);
  }
}
function drawBgHills() {
  const para = camX * 0.25, unit = 180;
  const first = Math.floor(para / unit) - 1;
  for (let k = first; k < first + Math.ceil(W / unit) + 2; k++) {
    const idx = ((k % 3) + 3) % 3;
    drawHill(Math.floor(k * unit - para + 90), GROUND_Y, 34 + idx * 10);
  }
}
function drawBgBushes() {
  const para = camX * 0.8, unit = 150;
  const first = Math.floor(para / unit) - 1;
  for (let k = first; k < first + Math.ceil(W / unit) + 2; k++) {
    drawBush(Math.floor(k * unit - para), GROUND_Y);
  }
}
// poucos prédios baixos ao longe — luzes ESTÁTICAS (estado por índice, sem piscar)
function drawFarBuildings() {
  const para = camX * 0.18, unit = 150;
  const heights = [30, 42, 34];
  const first = Math.floor(para / unit) - 1;
  for (let k = first; k < first + Math.ceil(W / unit) + 2; k++) {
    const idx = ((k % heights.length) + heights.length) % heights.length;
    const h = heights[idx];
    const sx = Math.floor(k * unit - para);
    const bw = 36;
    const body = idx % 2 ? '#7a6a86' : '#6a5a76';
    px(sx, GROUND_Y - h, bw, h, body);
    px(sx, GROUND_Y - h, bw, 2, '#8a7a96');
    let col = 0;
    for (let wx = sx + 4; wx < sx + bw - 4; wx += 8, col++) {
      let row = 0;
      for (let wy = GROUND_Y - h + 6; wy < GROUND_Y - 5; wy += 8, row++) {
        const lit = hash1(k * 97 + col * 13 + row * 29) < 0.32;   // fixo por prédio/janela
        px(wx, wy, 4, 5, lit ? '#ffd24a' : '#3a2f4a');
      }
    }
  }
}
// casinhas de telhado triangular, cores suaves variadas
function drawBgHouses() {
  const para = camX * 0.5, unit = 92;
  const walls = ['#e8d0a0', '#d8b8e0', '#a8d8c8', '#e0c0a0', '#c0d4ec'];
  const roofs = ['#b5502a', '#8a4a6a', '#3a7a5a', '#a06a2a', '#4a6a9a'];
  const first = Math.floor(para / unit) - 1;
  for (let k = first; k < first + Math.ceil(W / unit) + 2; k++) {
    const idx = ((k % walls.length) + walls.length) % walls.length;
    drawHouse(Math.floor(k * unit - para), GROUND_Y, walls[idx], roofs[idx]);
  }
}
function drawHouse(sx, baseY, wallC, roofC) {
  px(sx, baseY - 13, 22, 13, wallC);
  ctx.fillStyle = roofC;
  ctx.beginPath(); ctx.moveTo(sx - 2, baseY - 13); ctx.lineTo(sx + 11, baseY - 23); ctx.lineTo(sx + 24, baseY - 13); ctx.closePath(); ctx.fill();
  px(sx + 3, baseY - 8, 5, 8, '#6a4a2a');        // porta
  px(sx + 13, baseY - 9, 6, 5, '#9fd0e0');       // janela (cor fixa)
  px(sx + 13, baseY - 9, 6, 1, '#ffffff');
}
// coqueiros (tronco fino + copa de folhas)
function drawBgCoqueiros() {
  const para = camX * 0.6, unit = 108;
  const first = Math.floor(para / unit) - 1;
  for (let k = first; k < first + Math.ceil(W / unit) + 2; k++) {
    const idx = ((k % 2) + 2) % 2;
    drawCoqueiro(Math.floor(k * unit - para) + idx * 44, GROUND_Y, 34 + idx * 8);
  }
}
function drawCoqueiro(sx, baseY, th) {
  for (let i = 0; i < th; i += 3) px(sx + Math.floor(Math.sin(i * 0.12) * 2), baseY - th + i, 3, 3, '#8a5a2e');
  const tx = sx + 1, ty = baseY - th;
  const fronds = [[-12, -5], [-9, -9], [0, -11], [9, -9], [12, -5], [-6, -1], [6, -1]];
  for (const [dx, dy] of fronds) {
    for (let s = 1; s <= 4; s++) px(tx + Math.round(dx * s / 4), ty + Math.round(dy * s / 4), 2, 2, s < 3 ? '#3aa63a' : '#2e7a2e');
  }
  px(tx - 1, ty, 4, 3, '#2e8b2e');              // centro da copa
  px(tx - 2, ty + 2, 2, 2, '#5a3a1e'); px(tx + 2, ty + 2, 2, 2, '#5a3a1e');   // cocos
}
// araras-azuis sobrevoando em bandos de 3, de tempos em tempos (loop)
function drawAraras() {
  const flocks = [{ phase: 0, y: 34 }, { phase: 520, y: 60 }, { phase: 980, y: 26 }];
  const flap = Math.floor(stateTimer / 8) % 2;
  for (const f of flocks) {
    const p = (stateTimer * 0.5 + f.phase) % 1300;   // ciclo longo => passam com intervalos
    const x = (W + 40) - p;
    if (x < -40 || x > W + 40) continue;
    const bx = Math.floor(x);
    drawArara(bx, f.y, flap);
    drawArara(bx + 11, f.y + 5, flap);
    drawArara(bx + 22, f.y, flap);
  }
}
function drawArara(bx, by, flap) {
  px(bx, by, 3, 2, '#2b6ae6');                   // corpo
  px(bx + 3, by - 1, 2, 2, '#4a9aff');           // cabeça
  px(bx - 2, by, 2, 1, '#1a3aa0');               // cauda
  if (flap) { px(bx - 1, by - 2, 2, 1, '#2b6ae6'); px(bx + 2, by - 2, 2, 1, '#2b6ae6'); }
  else { px(bx - 1, by + 2, 2, 1, '#2b6ae6'); px(bx + 2, by + 2, 2, 1, '#2b6ae6'); }
}

function drawGroundAndBlocks() {
  // chão em blocos marrom-terra (fileira contínua, com buracos)
  for (const seg of level.platforms) {
    const x0 = Math.max(seg.x0, camX - 16), x1 = Math.min(seg.x1, camX + W + 16);
    for (let x = Math.floor(x0 / TILE) * TILE; x < x1; x += TILE) {
      const sx = x - camX;
      px(sx, GROUND_Y, TILE, TILE, '#c67a3a');
      px(sx, GROUND_Y, TILE, 3, '#e0a060');
      px(sx, GROUND_Y + TILE, TILE, TILE, '#8a4a1e');
      px(sx, GROUND_Y, 1, TILE * 2, '#7a3a14'); px(sx + TILE - 1, GROUND_Y, 1, TILE * 2, '#7a3a14');
    }
  }
  // bandeira de checkpoint no meio da fase
  {
    const sx = level.midX - camX;
    if (sx > -20 && sx < W) {
      px(sx, GROUND_Y - 44, 2, 44, '#c9c9d6');           // mastro
      px(sx - 1, GROUND_Y - 46, 4, 4, '#e8c343');        // topo
      const reached = level.midReached;
      ctx.fillStyle = reached ? '#2be6a0' : '#9aa0b0';
      ctx.beginPath();
      ctx.moveTo(sx + 2, GROUND_Y - 42);
      ctx.lineTo(sx + 16, GROUND_Y - 37);
      ctx.lineTo(sx + 2, GROUND_Y - 32);
      ctx.closePath(); ctx.fill();
    }
  }
  // torres de blocos de terra (mesma textura/cor do chão) — obstáculo sólido integrado
  for (const p of level.pipes) {
    const sx = p.x - camX; if (sx + p.w < 0 || sx > W) continue;
    for (let y = p.y; y < GROUND_Y; y += TILE) {
      const hh = Math.min(TILE, GROUND_Y - y);
      px(sx, y, p.w, hh, '#c67a3a');
      px(sx, y, p.w, 3, '#e0a060');
      px(sx, y + hh - 2, p.w, 2, '#8a4a1e');
    }
    px(sx, p.y, 1, GROUND_Y - p.y, '#7a3a14');
    px(sx + p.w - 1, p.y, 1, GROUND_Y - p.y, '#7a3a14');
  }
  // blocos
  for (const b of level.blocks) {
    if (b.dead) continue;
    if (b.type === 'hidden' && !b.revealed) continue;
    const sx = b.x - camX, sy = b.y - (b.bump > 0 ? 3 : 0);
    if (sx + b.w < 0 || sx > W) continue;
    if (b.type === 'question') {
      const glow = Math.floor(stateTimer / 12) % 3;
      const col = ['#f0a81e', '#ffc540', '#ffd76a'][glow];
      px(sx, sy, TILE, TILE, col);
      px(sx, sy, TILE, 2, '#ffe9a0'); px(sx, sy, 2, TILE, '#ffe9a0');
      px(sx + TILE - 2, sy, 2, TILE, '#a86a10'); px(sx, sy + TILE - 2, TILE, 2, '#a86a10');
      // inscrição "TJTO" brilhando em amarelo, com a mesma pulsação
      const txtCol = ['#fff2a0', '#ffffff', '#fff6c0'][glow];
      pixText('TJTO', sx + TILE / 2, sy + TILE - 5, txtCol, 6);
    } else if (b.type === 'used') {
      px(sx, sy, TILE, TILE, '#a06a3a'); px(sx, sy, TILE, 2, '#c08a5a'); px(sx, sy + TILE - 2, TILE, 2, '#7a4a1e');
    } else if (b.type === 'brick') {
      px(sx, sy, TILE, TILE, '#b5502a'); px(sx, sy, TILE, 2, '#d97a4a');
      ctx.fillStyle = '#7a2e14';
      ctx.fillRect(sx, sy + 4, TILE, 1); ctx.fillRect(sx, sy + 9, TILE, 1); ctx.fillRect(sx, sy + 14, TILE, 1);
      ctx.fillRect(sx + 5, sy, 1, 4); ctx.fillRect(sx + 11, sy + 5, 1, 4); ctx.fillRect(sx + 5, sy + 10, 1, 5);
    } else { // solid (estrutura/plataforma/escada)
      px(sx, sy, TILE, TILE, '#c9a86a'); px(sx, sy, TILE, 2, '#e8d4a0'); px(sx, sy + TILE - 2, TILE, 2, '#8a6b3a');
      px(sx, sy, 2, TILE, '#8a6b3a'); px(sx + TILE - 2, sy, 2, TILE, '#8a6b3a');
    }
  }
  // fragmentos de tijolo
  for (const f of level.fragments) { const sx = f.x - camX; px(sx, f.y, f.w, f.h, '#b5502a'); px(sx, f.y, f.w, 2, '#d97a4a'); }
}

function drawCoin(sx, y, anim) {
  const f = Math.floor(anim) % 4;
  const widths = [10, 6, 2, 6];
  const w = widths[f], ox = sx + (10 - w) / 2;
  px(ox, y, w, 12, '#ffd24a');
  px(ox, y, w, 12, '#ffd24a');
  ctx.fillStyle = '#b8860b'; ctx.fillRect(ox, y, w, 1); ctx.fillRect(ox, y + 11, w, 1);
  if (w >= 6) { ctx.fillStyle = '#fff2b0'; ctx.fillRect(ox + 1, y + 2, 1, 8); }
}
function drawCoins() {
  for (const c of level.coins) {
    if (c.taken) continue; const sx = c.x - camX; if (sx < -12 || sx > W) continue;
    drawCoin(sx, c.y + Math.sin(stateTimer * 0.1) * 1.5, c.anim);
  }
}

function drawEnemies() {
  for (const e of level.enemies) {
    if (e.dead) continue;
    const sx = e.x - camX; if (sx + 20 < 0 || sx > W) continue;
    if (e.type === 'providencia') drawProvidencia(sx, e.y, e.dir, e.flashTimer > 0);
    else drawAchado(sx, e.y, e.dir, e.flashTimer > 0);
    pixText(e.name, sx + e.w / 2, e.y - 4, '#fff', 6);
  }
}

function drawBoss() {
  const b = level.boss; if (!b) return;
  const sx = b.x - camX; if (sx + 60 < 0 || sx > W) return;
  if (b.defeated) {
    // pilha organizada de documentos com etiquetas verdes "CONCLUÍDO"
    const baseY = GROUND_Y;
    for (let i = 0; i < 5; i++) {
      const pw = 44 - i * 7;
      px(sx + (b.w - pw) / 2, baseY - 8 * (i + 1), pw, 8, i % 2 ? '#e8d4a0' : '#f2e6c2');
      px(sx + (b.w - pw) / 2, baseY - 8 * (i + 1), pw, 1, '#8a6b3a');
    }
    px(sx + 3, baseY - 22, 8, 5, '#2e8b57'); px(sx + b.w - 12, baseY - 38, 8, 5, '#2e8b57');
    pixText('CONCLUÍDO', sx + b.w / 2, baseY - 50, '#5ade9a', 6);
    return;
  }
  const breathe = Math.sin(b.breathe) * 1.5;
  const flash = b.flashTimer > 0;
  const tele = b.mode === 'telegraph' && Math.floor(stateTimer / 4) % 2 === 0;
  const paper = flash || tele ? '#fff' : '#e8d4a0';
  const dark = flash || tele ? '#fff' : '#8a6b3a';
  const red = flash || tele ? '#fff' : '#c0392b';
  const by = b.y + breathe;
  // corpo: pilha grande de documentos
  px(sx + 4, by + 4, b.w - 8, b.h - 8, paper);
  px(sx + 4, by + 4, b.w - 8, 3, dark);
  px(sx + 2, by + b.h - 18, b.w - 4, 4, red);   // faixa vermelha
  // fitas vermelhas laterais (tentáculos)
  px(sx, by + 8, 3, 10, red); px(sx + b.w - 3, by + 8, 3, 10, red);
  // olhos
  px(sx + 12, by + 12, 5, 5, '#fff'); px(sx + b.w - 17, by + 12, 5, 5, '#fff');
  px(sx + 14, by + 14, 2, 2, '#1a1a1a'); px(sx + b.w - 15, by + 14, 2, 2, '#1a1a1a');
  pixText(b.name, sx + b.w / 2, by - 6, '#ffd24a', 7);
}
function drawBossProjectiles() {
  for (const pr of level.bossProjectiles) {
    const sx = pr.x - camX;
    px(sx, pr.y, pr.w, pr.h, '#f2e6c2'); px(sx, pr.y + 3, pr.w, 1, '#a8834a');
    ctx.strokeStyle = '#8a6b3a'; ctx.lineWidth = 1; ctx.strokeRect(sx + 0.5, pr.y + 0.5, pr.w - 1, pr.h - 1);
  }
}
function drawShots() {
  for (const s of level.playerShots) {
    const sx = s.x - camX;
    px(sx, s.y, s.w, s.h, '#1b3a6b');                 // fundo sólido de contraste
    px(sx, s.y, s.w, s.h, '#1b3a6b');
    ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 1; ctx.strokeRect(sx + 0.5, s.y + 0.5, s.w - 1, s.h - 1);
    ctx.font = 'bold 6px monospace'; ctx.textAlign = 'center';
    ctx.fillStyle = '#fff'; ctx.fillText(s.word, sx + s.w / 2, s.y + 8);
    ctx.textAlign = 'left';
  }
}

function drawPlayer() {
  const powered = player.power.active > 0;
  if (player.invincible > 0 && !powered && Math.floor(player.invincible / 4) % 2 === 0) return;
  let pose = 'idle';
  if (player.attackTimer > 0) pose = 'shoot';
  else if (!player.onGround) pose = 'jump';
  else if (Math.abs(player.vx) > 0.2) pose = 'run';
  const footX = player.x + player.w / 2 - camX;
  const footY = player.y + player.h;
  let pal = HERO_PALS[player.charKey];
  if (powered) pal = goldTint(pal, stateTimer);
  drawHero(player.charKey, footX, footY, player.facing, pose, player.animFrame, pal);
}

function drawPops() {
  for (const p of level.pops) { pixText(p.text, p.x - camX, p.y, p.color, 7); }
}

/* =========================================================================
   HUD — estilo Mario
   ========================================================================= */
function drawHUD() {
  const name = (CHAR_LABEL[player.charKey] || 'PAULA');
  pixText(name + '  ' + String(player.score).padStart(6, '0'), 6, 10, '#fff', 8, 'left');
  // moedas ao centro
  drawCoin(W / 2 - 20, 2, Math.floor(stateTimer / 8) % 4);
  pixText('x ' + String(player.coins).padStart(2, '0'), W / 2 + 4, 10, '#ffe066', 8, 'left');
  // vidas + fase à direita
  pixText('VIDAS x' + player.lives, W - 6, 10, '#fff', 8, 'right');

  // Modo Diretora (só Paula)
  if (player.charKey === 'paula') {
    const bx = W - 60, by = 14, bw = 54, bh = 6;
    let label, col, fill;
    if (player.power.active > 0) { label = 'DIRETORA!'; col = '#ffd24a'; fill = player.power.active / POWER_DURATION; }
    else if (player.power.cooldown > 0) { label = 'RECARGA'; col = '#888'; fill = 1 - player.power.cooldown / (POWER_DURATION + POWER_COOLDOWN); }
    else { label = 'E: DIRETORA'; col = '#5ade9a'; fill = 1; }
    px(bx, by, bw, bh, '#000'); px(bx + 1, by + 1, (bw - 2) * fill, bh - 2, col);
    pixText(label, bx + bw / 2, by + bh + 8, col, 6);
  }

  // barra de vida do chefe durante o confronto
  const b = level.boss;
  if (b && b.aggro && !b.defeated) {
    const bx = 40, by = 22, bw = 240, bh = 8;
    pixText(b.name, W / 2, by - 2, '#fff', 7);
    px(bx - 1, by - 1, bw + 2, bh + 2, '#000'); px(bx, by, bw, bh, '#3a1010');
    px(bx, by, bw * (b.hp / b.maxHp), bh, '#c0392b');
  }
}
const CHAR_LABEL = { paula: 'PAULA', deborah: 'DÉBORAH', matheus: 'MATHEUS' };

/* =========================================================================
   TELAS DE UI
   ========================================================================= */
function pointInRect(pt, x, y, w, h) { return pt && pt.x >= x && pt.x <= x + w && pt.y >= y && pt.y <= y + h; }

// ----- BRASÃO ORIGINAL do GABDIGEP (composição heráldica, arte própria) -----
function drawShieldEmblem(cx, cy) {
  const NAVY = '#1B3A6B', GOLD = '#FFD700', GOLDS = '#B8860B', BLACK = '#0a0a12';
  // ramos de louro espelhados (dois lados)
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < 6; i++) {
      const lx = cx + side * (26 + Math.sin(i) * 2);
      const ly = cy - 18 + i * 6;
      px(lx - 2, ly, 4, 3, GOLD);
      px(lx + side * 3 - 2, ly + 1, 3, 2, GOLDS);
    }
    px(cx + side * 24, cy + 16, 3, 6, GOLDS); // haste
  }
  // escudo (topo reto, base em ponta)
  ctx.fillStyle = BLACK;
  drawShieldPath(cx, cy, 24, 30); ctx.fill();
  ctx.fillStyle = GOLD;
  drawShieldPath(cx, cy, 22, 28); ctx.fill();
  ctx.fillStyle = NAVY;
  drawShieldPath(cx, cy, 18, 24); ctx.fill();
  // balança da justiça estilizada (traço grosso, simétrica)
  px(cx - 1, cy - 12, 2, 20, GOLD);        // haste central
  px(cx - 12, cy - 12, 24, 2, GOLD);       // travessão
  px(cx - 13, cy - 11, 2, 6, GOLD); px(cx + 11, cy - 11, 2, 6, GOLD); // cordas
  px(cx - 16, cy - 5, 8, 2, GOLD); px(cx - 15, cy - 4, 6, 2, GOLDS);  // prato esq
  px(cx + 8, cy - 5, 8, 2, GOLD); px(cx + 9, cy - 4, 6, 2, GOLDS);    // prato dir
  px(cx - 4, cy + 8, 8, 2, GOLD);          // base
  // estrela no topo (remate)
  drawStar(cx, cy - 30, 5, GOLD);
  // faixa/banner com GABDIGEP
  px(cx - 30, cy + 16, 60, 10, NAVY);
  px(cx - 30, cy + 16, 60, 1, GOLD); px(cx - 30, cy + 25, 60, 1, GOLDS);
  px(cx - 33, cy + 18, 4, 6, GOLDS); px(cx + 29, cy + 18, 4, 6, GOLDS); // pontas da fita
  pixText('GABDIGEP', cx, cy + 24, GOLD, 7);
}
function drawShieldPath(cx, cy, hw, hh) {
  ctx.beginPath();
  ctx.moveTo(cx - hw, cy - hh);
  ctx.lineTo(cx + hw, cy - hh);
  ctx.lineTo(cx + hw, cy + hh * 0.35);
  ctx.lineTo(cx, cy + hh);
  ctx.lineTo(cx - hw, cy + hh * 0.35);
  ctx.closePath();
}
function drawStar(cx, cy, r, color) {
  ctx.fillStyle = color; ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const ang = (Math.PI / 5) * i - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.42;
    const x = cx + Math.cos(ang) * rad, y = cy + Math.sin(ang) * rad;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath(); ctx.fill();
}

function drawTitleScreen() {
  ctx.fillStyle = '#0b0b1a'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#20203a';
  for (let i = 0; i < 26; i++) ctx.fillRect((i * 37) % W, (i * 61) % H, 2, 2);

  drawShieldEmblem(W / 2, 58);

  pixText('DIGEP POR DENTRO', W / 2 + 1, 133, '#7a1f1f', 16);
  pixText('DIGEP POR DENTRO', W / 2, 132, '#ffd24a', 16);

  // "PRESSIONE QUALQUER TECLA" piscando devagar (~800ms)
  if (Math.floor(stateTimer / 48) % 2 === 0) {
    pixText('PRESSIONE QUALQUER TECLA', W / 2, 178, '#ffffff', 9);
  }
  if (!audioUnlocked) pixText('(som liga ao pressionar)', W / 2, 194, '#8a8aa0', 6);

  // crédito discreto no canto inferior direito
  pixText('Criado por Matheus Alencar — GABDIGEP', W - 4, H - 5, '#9a9aae', 5, 'right');
}

function drawCharSelectScreen() {
  ctx.fillStyle = '#0b0b1a'; ctx.fillRect(0, 0, W, H);
  pixText('ESCOLHA SEU PERSONAGEM', W / 2, 24, '#ffd24a', 12);

  for (const c of getCharLayout()) {
    const sel = c.key === charSelectHighlight;
    if (sel) { ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 2; ctx.strokeRect(c.x - 26, c.y - 44, 52, 60); }
    drawHero(c.key, c.x, c.y + 12, 1, 'idle', 0, HERO_PALS[c.key], 2);
    pixText(c.name, c.x, c.y + 24, sel ? '#ffd24a' : '#cfcfcf', 9);
  }

  // cartão de descrição do destacado
  const desc = CHAR_DESC[charSelectHighlight];
  ctx.fillStyle = 'rgba(20,20,40,0.9)'; ctx.fillRect(30, 190, W - 60, 40);
  ctx.strokeStyle = '#55558a'; ctx.lineWidth = 1; ctx.strokeRect(30, 190, W - 60, 40);
  pixText(desc[0], W / 2, 202, '#ffd24a', 8);
  pixText(desc[1], W / 2, 213, '#fff', 6);
  pixText(desc[2], W / 2, 223, '#bbb', 6);
}
const CHAR_DESC = {
  paula: ['PAULA — DIRETORA', 'Superpoder MODO DIRETORA [E]: invencível por 8s.', 'Recomendado para quem quer só aproveitar o passeio.'],
  deborah: ['DÉBORAH — GESTORA', 'Sem poder especial. Só talento.', 'Carrega a prancheta de comando com tudo sob controle.'],
  matheus: ['MATHEUS — ANALISTA', 'Sem poder especial. Só talento.', 'Prancheta nas costas, resolve tudo no modo normal.']
};

function drawIntroScreen() {
  ctx.fillStyle = '#0b0b1a'; ctx.fillRect(0, 0, W, H);
  pixText('GABINETE', W / 2, 92, '#ffd24a', 14);
  pixText('Monstro CNJ Cheio de Providências', W / 2, 114, '#fff', 8);
  pixText('Toque ou pressione uma tecla para começar', W / 2, 150, '#aaa', 8);
}

function drawStageClearScreen() {
  drawPlaying();
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
  pixText('MONSTRO CNJ DERROTADO!', W / 2, 108, '#ffd24a', 12);
  pixText('Pontuação: ' + player.score + '   Moedas: ' + player.coins, W / 2, 128, '#fff', 8);
}

// ----- CENA DE GAME OVER temática (Diário Oficial) -----
function drawGameOverScreen() {
  ctx.fillStyle = '#1a0a0a'; ctx.fillRect(0, 0, W, H);
  pixText('GAME OVER', W / 2, 60, '#e63946', 20);

  // folha de "Diário Oficial" com a manchete
  const px0 = W / 2 - 96, py0 = 80, pw = 192, ph = 62;
  px(px0, py0, pw, ph, '#efe7d0'); px(px0, py0, pw, 2, '#cfc3a0');
  ctx.strokeStyle = '#8a7a50'; ctx.lineWidth = 1; ctx.strokeRect(px0 + 0.5, py0 + 0.5, pw - 1, ph - 1);
  pixText('— DIÁRIO OFICIAL —', W / 2, py0 + 14, '#7a2e14', 7);
  ctx.strokeStyle = '#b0a480'; ctx.beginPath(); ctx.moveTo(px0 + 8, py0 + 19); ctx.lineTo(px0 + pw - 8, py0 + 19); ctx.stroke();
  pixText('Decreto de Exoneração', W / 2, py0 + 34, '#1a1a2a', 11);
  pixText('no Diário', W / 2, py0 + 47, '#1a1a2a', 11);
  // carimbo vermelho inclinado
  ctx.save(); ctx.translate(px0 + pw - 30, py0 + 44); ctx.rotate(-0.25);
  ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 2; ctx.strokeRect(-22, -8, 44, 16);
  pixText('EXONERADO', 0, 3, '#c0392b', 6); ctx.restore();

  pixText('Pontuação final: ' + player.score, W / 2, 158, '#fff', 8);
  drawButton(W / 2 - 55, 170, 110, 22, 'TENTAR NOVAMENTE');
  pixText('(clique em qualquer lugar ou Z)', W / 2, 204, '#888', 6);
}

function drawConfetti() {
  for (const p of victoryConfetti) {
    px(Math.floor(p.x + Math.sin(p.sway) * 2), Math.floor(p.y), p.s, p.s, p.c);
  }
}
function drawTrophy(cx, topY) {
  const g = '#ffd24a', gd = '#b8860b', sh = '#fff6c0';
  // brilho atrás
  ctx.fillStyle = 'rgba(255,230,120,0.25)'; ctx.beginPath(); ctx.arc(cx, topY + 8, 16, 0, Math.PI * 2); ctx.fill();
  // taça
  px(cx - 8, topY, 16, 8, g); px(cx - 6, topY + 8, 12, 3, g);
  px(cx - 8, topY, 16, 2, sh);
  // alças
  px(cx - 11, topY + 1, 3, 5, gd); px(cx + 8, topY + 1, 3, 5, gd);
  // haste e base
  px(cx - 1, topY + 11, 2, 4, gd);
  px(cx - 5, topY + 15, 10, 3, gd); px(cx - 6, topY + 18, 12, 2, g);
  pixText('1', cx, topY + 7, gd, 6);
}
function drawPodium(cx, baseY) {
  const blocks = [
    { dx: -34, w: 30, h: 22, n: '2' },
    { dx: -15, w: 30, h: 32, n: '1' },   // 1º lugar ao centro (mais alto)
    { dx: 16, w: 30, h: 16, n: '3' }
  ];
  for (const b of blocks) {
    const x = cx + b.dx, y = baseY - b.h;
    px(x, y, b.w, b.h, '#2a2f66'); px(x, y, b.w, 2, '#4a5aa0');
    px(x, y, 2, b.h, '#1b2044'); px(x + b.w - 2, y, 2, b.h, '#1b2044');
    pixText(b.n, x + b.w / 2, y + 13, '#ffd24a', 9);
  }
}
function drawVictoryScreen() {
  // céu comemorativo
  const bands = ['#12324a', '#1a4a5a', '#256a5a'];
  for (let i = 0; i < bands.length; i++) { ctx.fillStyle = bands[i]; ctx.fillRect(0, i * (H / bands.length), W, H / bands.length + 1); }
  drawConfetti();

  // pódio + personagem erguendo o troféu
  const podiumBase = 176;
  drawPodium(W / 2, podiumBase);
  const footY = podiumBase - 32;                 // topo do bloco do 1º lugar
  drawHero(player.charKey, W / 2, footY, 1, 'jump', 0, HERO_PALS[player.charKey], 2);
  drawTrophy(W / 2, footY - 62);                 // troféu acima da cabeça

  // mensagem
  pixText('PARABÉNS!', W / 2, 26, '#ffd24a', 16);
  pixText('VOCÊ CUMPRIU O EXPEDIENTE.', W / 2, 42, '#ffffff', 9);
  pixText('Amanhã tem mais.', W / 2, 56, '#bfe3ff', 7);

  // pontuação + botão
  pixText('Pontuação final: ' + player.score + '   Moedas: ' + player.coins, W / 2, 196, '#fff', 8);
  drawButton(W / 2 - 60, 206, 120, 20, 'JOGAR NOVAMENTE');
}

function drawButton(x, y, w, h, label) {
  px(x, y, w, h, '#2a2a45');
  ctx.strokeStyle = '#e8c343'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
  pixText(label, x + w / 2, y + h / 2 + 3, '#fff', 9);
}

// ----- Tela de seleção de GAME (novo) -----
function drawGameSelectScreen() {
  ctx.fillStyle = '#0b0b1a'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#20203a';
  for (let i = 0; i < 20; i++) ctx.fillRect((i * 37) % W, (i * 61) % H, 2, 2);
  pixText('SELECIONE O JOGO', W / 2, 40, '#ffd24a', 13);

  const cards = getGameCardLayout();
  // Card 0 — Game 1 (jogável)
  const c0 = cards[0], sel0 = gameSelectHighlight === 0;
  px(c0.x, c0.y, c0.w, c0.h, '#1b2a52');
  px(c0.x, c0.y, c0.w, 3, '#2c3d7a');
  ctx.strokeStyle = sel0 ? '#ffd24a' : '#55558a'; ctx.lineWidth = sel0 ? 3 : 1;
  ctx.strokeRect(c0.x + 0.5, c0.y + 0.5, c0.w - 1, c0.h - 1);
  pixText('GAME 1', c0.x + c0.w / 2, c0.y + 20, '#ffd24a', 12);
  // mini-monstro
  const mx = c0.x + c0.w / 2 - 9, my = c0.y + 30;
  px(mx, my, 18, 16, '#b23a3a'); px(mx + 2, my + 2, 14, 10, '#e0a0a0');
  px(mx + 4, my + 5, 3, 3, '#fff'); px(mx + 11, my + 5, 3, 3, '#fff');
  px(mx + 5, my + 6, 1, 1, '#111'); px(mx + 12, my + 6, 1, 1, '#111');
  pixText('O Monstro CNJ', c0.x + c0.w / 2, c0.y + 66, '#fff', 7);
  pixText('Cheio de', c0.x + c0.w / 2, c0.y + 78, '#fff', 7);
  pixText('Providências', c0.x + c0.w / 2, c0.y + 90, '#fff', 7);

  // Card 1 — Game 2 (jogável)
  const c1 = cards[1], sel1 = gameSelectHighlight === 1;
  px(c1.x, c1.y, c1.w, c1.h, '#123a4a');
  px(c1.x, c1.y, c1.w, 3, '#1e5a72');
  ctx.strokeStyle = sel1 ? '#ffd24a' : '#55558a'; ctx.lineWidth = sel1 ? 3 : 1;
  ctx.strokeRect(c1.x + 0.5, c1.y + 0.5, c1.w - 1, c1.h - 1);
  pixText('GAME 2', c1.x + c1.w / 2, c1.y + 20, '#ffd24a', 12);
  // mini-arara
  drawArara(c1.x + c1.w / 2 - 11, c1.y + 38, Math.floor(stateTimer / 8) % 2);
  pixText('VOO DA ARARA', c1.x + c1.w / 2, c1.y + 66, '#fff', 7);
  pixText('Desvie das', c1.x + c1.w / 2, c1.y + 78, '#fff', 7);
  pixText('dificuldades', c1.x + c1.w / 2, c1.y + 90, '#fff', 7);

  const lbRect = getLeaderboardLinkRect();
  drawButton(lbRect.x, lbRect.y, lbRect.w, lbRect.h, 'VER PLACAR');

  pixText('Setas p/ escolher · Enter/clique confirma · ESC volta', W / 2, H - 14, '#888', 6);
}

function drawPlaying() {
  drawBackground();
  drawGroundAndBlocks();
  drawCoins();
  drawEnemies();
  drawBoss();
  drawBossProjectiles();
  drawShots();
  drawPops();
  drawPlayer();
  drawHUD();
}

function drawFadeIn() {
  const dur = 50;
  if (gameState !== STATE.PLAYING && stateTimer < dur) {
    ctx.fillStyle = 'rgba(0,0,0,' + (1 - stateTimer / dur).toFixed(2) + ')';
    ctx.fillRect(0, 0, W, H);
  }
}

function render() {
  ctx.setTransform(RENDER_SCALE, 0, 0, RENDER_SCALE, 0, 0);
  switch (gameState) {
    case STATE.TITLE: drawTitleScreen(); break;
    case STATE.GAME_SELECT: drawGameSelectScreen(); break;
    case STATE.CHAR_SELECT: drawCharSelectScreen(); break;
    case STATE.INTRO: drawIntroScreen(); break;
    case STATE.PLAYING: drawPlaying(); break;
    case STATE.STAGE_CLEAR: drawStageClearScreen(); break;
    case STATE.GAME_OVER: drawGameOverScreen(); break;
    case STATE.VICTORY: drawVictoryScreen(); break;
    case STATE.G2_NAME_ENTRY: drawGame2Background(); break;
    case STATE.G2_INTRO: drawGame2Intro(); break;
    case STATE.G2_PLAYING: drawGame2Playing(); break;
    case STATE.G2_OVER: drawGame2Over(); break;
  }
  drawFadeIn();
}

/* =========================================================================
   LOOP
   ========================================================================= */
function loop() { update(); render(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
