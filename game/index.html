<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DIGEP por Dentro</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0b0b1a;
    color: #fff;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #wrap {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; width: 100%;
    gap: 6px;
  }
  #title {
    font-size: 14px; letter-spacing: 2px; color: #ffd24a; text-shadow: 2px 2px #7a1f1f;
    text-align: center;
  }
  #canvasWrap {
    position: relative;
    width: min(98vw, 150vh);
    aspect-ratio: 400 / 240;
  }
  #gameCanvas {
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    background: #5c94fc;
    border: 4px solid #3a3a5a;
    box-shadow: 0 0 0 4px #16162a, 0 8px 24px rgba(0,0,0,0.6);
    /* Escala para CIMA até preencher a tela (mantendo a proporção 400:240 = 5:3) —
       max-width/max-height sozinhos só limitam, nunca ampliam além do tamanho nativo. */
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .gameOverlay {
    position: absolute; inset: 4px;
    display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    background: rgba(5,5,15,0.86);
    text-align: center;
    padding: 20px;
    z-index: 10;
  }
  .gameOverlay.show { display: flex; }
  .gameOverlay h2 { color: #ffd24a; font-size: 15px; letter-spacing: 1px; margin: 0; text-shadow: 2px 2px #7a1f1f; }
  .gameOverlay input {
    font-family: 'Courier New', monospace; font-size: 16px; padding: 10px 14px;
    border-radius: 6px; border: 2px solid #e8c343; background: #1a1a2e; color: #fff;
    text-align: center; width: 220px; max-width: 80%;
  }
  .gameOverlay .goBtn {
    cursor: pointer; background: #2a2a45; border: 2px solid #e8c343; border-radius: 8px;
    padding: 10px 28px; color: #fff; font-size: 13px; letter-spacing: 1px;
  }
  .gameOverlay .goBtn:active { background: #55558a; }
  .gameOverlay .goLink {
    cursor: pointer; color: #888; font-size: 11px; text-decoration: underline;
  }
  .gameOverlay .goError { color: #ff6b6b; font-size: 10.5px; min-height: 12px; margin-top: -8px; }

  /* ----- placar (painel opaco, tipo troféu — não é mais um overlay translúcido) ----- */
  .lbOverlay { background: rgba(3,3,10,0.95); }
  .lbPanel {
    background: linear-gradient(180deg, #22223f, #12121f);
    border: 3px solid #e8c343;
    border-radius: 12px;
    box-shadow: 0 0 0 1px #6a561f, 0 12px 30px rgba(0,0,0,0.7);
    padding: 18px 22px 20px;
    width: 96%; height: 94%; max-width: 96%;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .lbPanel h2 { font-size: 19px; }
  .lbHeader {
    display: flex; width: 100%; padding: 0 12px 8px;
    border-bottom: 2px solid rgba(232,195,67,0.35);
    font-size: 11px; letter-spacing: 1.5px; color: #9a9ac0;
  }
  .lbHPos { width: 40px; flex: none; }
  .lbHName { flex: 1; text-align: left; }
  .lbHScore { flex: none; }
  .lbList { display: flex; flex-direction: column; gap: 7px; width: 100%; flex: 1; overflow-y: auto; }
  .lbRow {
    display: flex; align-items: center; gap: 12px;
    font-size: 15px; padding: 10px 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    border-left: 4px solid transparent;
  }
  .lbRow:nth-child(even) { background: rgba(255,255,255,0.02); }
  .lbRow.lbTop1 { background: rgba(255,210,74,0.18); border-left-color: #ffd24a; }
  .lbRow.lbTop2 { background: rgba(201,201,216,0.14); border-left-color: #c9c9d8; }
  .lbRow.lbTop3 { background: rgba(205,127,50,0.16); border-left-color: #cd7f32; }
  .lbPos { width: 40px; flex: none; text-align: left; font-weight: bold; color: #ffd24a; font-size: 20px; }
  .lbInfo { flex: 1; display: flex; flex-direction: column; overflow: hidden; text-align: left; gap: 1px; }
  .lbName { color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; font-size: 16px; }
  .lbUnidade { color: #9a9ac0; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lbCheat { color: #ff8a5c; font-style: italic; }
  .lbScore {
    flex: none; color: #0b0b1a; font-weight: bold; font-size: 17px;
    background: #e8c343; padding: 5px 16px; border-radius: 999px; min-width: 18px; text-align: center;
  }
  .lbLoading { justify-content: center; color: #bbb; background: none; font-size: 14px; }
  .lbPager { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
  .lbPageBtn {
    cursor: pointer; background: #2a2a45; border: 2px solid #55558a; border-radius: 6px;
    padding: 6px 14px; color: #fff; font-size: 12px; letter-spacing: 0.5px; font-family: inherit;
  }
  .lbPageBtn:disabled { opacity: 0.35; cursor: not-allowed; }
  .lbPageBtn:not(:disabled):active { background: #55558a; }
  #leaderboardPageLabel { color: #9a9ac0; font-size: 12px; min-width: 110px; text-align: center; }
  #controls {
    display: flex; justify-content: space-between; align-items: center;
    width: 96vw; max-width: 640px;
    margin-top: 4px;
    touch-action: none;
  }
  .padGroup { display: flex; gap: 8px; }
  .padBtn {
    width: 52px; height: 52px;
    background: #2a2a45;
    border: 3px solid #55558a;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    touch-action: none;
  }
  .padBtn:active, .padBtn.active { background: #55558a; }
  #actionGroup { display: flex; gap: 8px; }
  #btnAttack { background: #6a1f2a; border-color: #d24a5a; }
  #btnJump { background: #1f3a6a; border-color: #4a8ad2; }
  #btnPower { background: #6a561f; border-color: #e8c343; }
  .hint { font-size: 9px; color: #888; text-align: center; margin-top: 2px; }
  @media (min-width: 900px) {
    #controls { display: none; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="title">DIGEP POR DENTRO</div>
  <div id="canvasWrap">
    <canvas id="gameCanvas" width="800" height="480"></canvas>

    <div id="nameEntryOverlay" class="gameOverlay">
      <h2>QUEM ESTÁ VOANDO?</h2>
      <input id="nameEntryInput" maxlength="20" placeholder="Seu nome" autocomplete="off">
      <input id="nameEntryUnidade" maxlength="40" placeholder="Sua unidade/setor" autocomplete="off">
      <div class="goError" id="nameEntryError"></div>
      <div class="goBtn" id="nameEntryBtn">VOAR</div>
      <div class="goLink" id="nameEntryCancel">‹ voltar ao menu</div>
    </div>

    <div id="leaderboardOverlay" class="gameOverlay lbOverlay">
      <div class="lbPanel">
        <h2>🏆 MELHORES VOOS</h2>
        <div class="lbHeader">
          <span class="lbHPos">#</span>
          <span class="lbHName">JOGADOR</span>
          <span class="lbHScore">PONTOS</span>
        </div>
        <div id="leaderboardList" class="lbList"></div>
        <div class="lbPager" id="leaderboardPager">
          <button class="lbPageBtn" id="leaderboardPrevBtn">‹ Anterior</button>
          <span id="leaderboardPageLabel">Página 1 de 1</span>
          <button class="lbPageBtn" id="leaderboardNextBtn">Próxima ›</button>
        </div>
        <div class="goBtn" id="leaderboardCloseBtn">FECHAR</div>
      </div>
    </div>
  </div>
  <div class="hint">Setas/WASD: mover e pular | Z: atirar | E: Modo Diretora (Paula) | ESC: menu</div>
  <div id="controls">
    <div class="padGroup">
      <div class="padBtn" id="btnLeft">&#9664;</div>
      <div class="padBtn" id="btnRight">&#9654;</div>
    </div>
    <div id="actionGroup">
      <div class="padBtn" id="btnPower">E</div>
      <div class="padBtn" id="btnAttack">Z</div>
      <div class="padBtn" id="btnJump">&#8593;</div>
    </div>
  </div>
</div>

<script>
"use strict";

/* =========================================================================
   CONFIGURAÇÃO GERAL
   ========================================================================= */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 400, H = 240;             // resolução lógica — mais widescreen, aproveita telas largas
const RENDER_SCALE = 2;            // canvas físico 800x480
const TILE = 16;                   // tamanho do bloco (Mario-like)
const GROUND_Y = 208;              // topo do chão (2 tiles de altura abaixo)
const GRAVITY = 0.42;
const JUMP_VELOCITY = -7.9;
const STOMP_BOUNCE = -4.8;
const MOVE_SPEED = 1.5;
const FRICTION = 0.82;
const MAX_FALL = 7;

/* --- Entrada --- */
const KEY_MAP = {
  left: ['ArrowLeft', 'a', 'A'],
  right: ['ArrowRight', 'd', 'D'],
  up: ['ArrowUp', 'w', 'W', ' '],
  attack: ['z', 'Z', 'j', 'J'],
  power: ['e', 'E']
};
const keys = { left: false, right: false, up: false, attack: false, power: false };
const keysPressedThisFrame = { up: false, attack: false, power: false, esc: false, enter: false, any: false };

window.addEventListener('keydown', (e) => {
  if (e.target && e.target.tagName === 'INPUT') return; // deixa o campo de nome digitar normalmente
  ensureAudio();
  keysPressedThisFrame.any = true;
  if (matchKey(e.key, 'left')) keys.left = true;
  if (matchKey(e.key, 'right')) keys.right = true;
  if (matchKey(e.key, 'up')) { if (!keys.up) keysPressedThisFrame.up = true; keys.up = true; }
  if (matchKey(e.key, 'attack')) { if (!keys.attack) keysPressedThisFrame.attack = true; keys.attack = true; }
  if (matchKey(e.key, 'power')) { if (!keys.power) keysPressedThisFrame.power = true; keys.power = true; }
  if (e.key === 'Enter') keysPressedThisFrame.enter = true;
  if (e.key === 'Escape') keysPressedThisFrame.esc = true;
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Escape', 'Enter'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', (e) => {
  if (matchKey(e.key, 'left')) keys.left = false;
  if (matchKey(e.key, 'right')) keys.right = false;
  if (matchKey(e.key, 'up')) keys.up = false;
  if (matchKey(e.key, 'attack')) keys.attack = false;
  if (matchKey(e.key, 'power')) keys.power = false;
});
function matchKey(k, name) { return KEY_MAP[name].includes(k); }

function bindTouchBtn(id, onDown, onUp) {
  const el = document.getElementById(id);
  const down = (e) => { e.preventDefault(); ensureAudio(); keysPressedThisFrame.any = true; el.classList.add('active'); onDown(); };
  const up = (e) => { e.preventDefault(); el.classList.remove('active'); onUp(); };
  el.addEventListener('touchstart', down, { passive: false });
  el.addEventListener('touchend', up, { passive: false });
  el.addEventListener('touchcancel', up, { passive: false });
  el.addEventListener('mousedown', down);
  el.addEventListener('mouseup', up);
  el.addEventListener('mouseleave', up);
}
bindTouchBtn('btnLeft', () => keys.left = true, () => keys.left = false);
bindTouchBtn('btnRight', () => keys.right = true, () => keys.right = false);
bindTouchBtn('btnJump', () => { if (!keys.up) keysPressedThisFrame.up = true; keys.up = true; }, () => keys.up = false);
bindTouchBtn('btnAttack', () => { if (!keys.attack) keysPressedThisFrame.attack = true; keys.attack = true; }, () => keys.attack = false);
bindTouchBtn('btnPower', () => { if (!keys.power) keysPressedThisFrame.power = true; keys.power = true; }, () => keys.power = false);

/* Clique/toque na tela para UI. Mapeia tela->lógico pela ÁREA DE CONTEÚDO
   do canvas (desconta a borda de 4px), senão os botões desalinham. */
let clickPoint = null;
function toLogicalPoint(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  const bx = canvas.clientLeft || 0, by = canvas.clientTop || 0;
  const contentW = r.width - bx * 2, contentH = r.height - by * 2;
  if (contentW <= 0 || contentH <= 0) return null;
  return {
    x: (clientX - (r.left + bx)) * (W / contentW),
    y: (clientY - (r.top + by)) * (H / contentH)
  };
}
canvas.addEventListener('click', (e) => { ensureAudio(); keysPressedThisFrame.any = true; clickPoint = toLogicalPoint(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', (e) => { ensureAudio(); keysPressedThisFrame.any = true; const t = e.changedTouches[0]; clickPoint = toLogicalPoint(t.clientX, t.clientY); }, { passive: true });

/* =========================================================================
   ÁUDIO — só é desbloqueado por interação do usuário (política de autoplay).
   O primeiro gesto na tela inicial libera o AudioContext e inicia a trilha.
   ========================================================================= */
let actx = null;
let audioUnlocked = false;
function ensureAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === 'suspended') actx.resume();
  if (actx && actx.state === 'running') audioUnlocked = true;
}
function beep(freq, dur, type, vol) {
  if (!actx) return;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.value = (vol !== undefined ? vol : 0.08);
  osc.connect(gain); gain.connect(actx.destination);
  const t0 = actx.currentTime;
  gain.gain.setValueAtTime(gain.gain.value, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.start(t0); osc.stop(t0 + dur);
}
const SFX = {
  jump: () => beep(520, 0.12, 'square', 0.07),
  shoot: () => { beep(880, 0.05, 'square', 0.06); setTimeout(() => beep(600, 0.05, 'square', 0.04), 30); },
  stomp: () => { beep(260, 0.07, 'square', 0.08); setTimeout(() => beep(520, 0.08, 'square', 0.06), 55); },
  coin: () => { beep(988, 0.07, 'square', 0.06); setTimeout(() => beep(1319, 0.12, 'square', 0.06), 70); },
  bump: () => beep(180, 0.06, 'square', 0.06),
  brick: () => beep(150, 0.09, 'square', 0.07),
  oneup: () => { [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.1, 'square', 0.06), i * 70)); },
  power: () => { [660, 880, 1100].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'square', 0.07), i * 60)); },
  hit: () => beep(140, 0.15, 'square', 0.09),
  hurt: () => beep(90, 0.25, 'sawtooth', 0.1),
  defeat: () => { beep(300, 0.1, 'square', 0.09); setTimeout(() => beep(500, 0.15, 'square', 0.09), 90); },
  summon: () => { beep(200, 0.12, 'sawtooth', 0.07); setTimeout(() => beep(160, 0.12, 'sawtooth', 0.06), 100); },
  dive: () => beep(300, 0.2, 'sawtooth', 0.08),
  checkpoint: () => { [523, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'square', 0.07), i * 90)); },
  stageClear: () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'square', 0.08), i * 110)); },
  gameOver: () => { [400, 300, 200, 120].forEach((f, i) => setTimeout(() => beep(f, 0.25, 'sawtooth', 0.09), i * 160)); },
  victory: () => { [523, 659, 784, 988, 1175].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'square', 0.09), i * 130)); },
  flap: () => beep(720, 0.06, 'square', 0.06),
  point: () => beep(1200, 0.05, 'square', 0.05),
  crash: () => { beep(200, 0.14, 'sawtooth', 0.09); setTimeout(() => beep(90, 0.22, 'sawtooth', 0.09), 90); }
};

// trilha 8-bit ORIGINAL do jogo (melodia própria — não é o tema do Mario)
let musicGen = 0;
let musicPlaying = false;
const MELODY = [
  [440, 0.22], [523, 0.22], [587, 0.22], [523, 0.22],
  [659, 0.30], [0, 0.10], [587, 0.22], [523, 0.22],
  [494, 0.30], [0, 0.10], [392, 0.22], [440, 0.22],
  [494, 0.44], [0, 0.14],
  [523, 0.22], [587, 0.22], [659, 0.22], [698, 0.22],
  [784, 0.30], [0, 0.10], [659, 0.22], [523, 0.22],
  [587, 0.44], [0, 0.10], [440, 0.22], [494, 0.22],
  [523, 0.50], [0, 0.20]
];
function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  const myGen = ++musicGen;
  let i = 0;
  function step() {
    if (musicGen !== myGen || !actx) { musicPlaying = false; return; }
    const [freq, dur] = MELODY[i % MELODY.length];
    if (freq > 0) { beep(freq, dur * 0.9, 'square', 0.04); beep(freq / 2, dur * 0.9, 'triangle', 0.025); }
    i++;
    setTimeout(step, dur * 1000);
  }
  step();
}

/* =========================================================================
   DESENHO PIXELADO — utilitários
   ========================================================================= */
function px(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(Math.round(x), Math.round(y), w, h); }

function pixText(text, cx, y, color, size, align) {
  ctx.font = 'bold ' + (size || 8) + 'px monospace';
  ctx.textAlign = align || 'center';
  ctx.fillStyle = '#000';
  ctx.fillText(text, cx + 1, y + 1);
  ctx.fillStyle = color || '#fff';
  ctx.fillText(text, cx, y);
  ctx.textAlign = 'left';
}

/* =========================================================================
   PERSONAGENS 16-BIT — desenhados proceduralmente numa grade de 16x20
   "big-pixels" (cada célula = 2px lógicos => sprite 32x40). Paleta rica,
   sem antialiasing. Animações: idle(2), run(4), jump(1), shoot(1), gold.
   ========================================================================= */
const HERO_GW = 16, HERO_GH = 20, HERO_P = 1;   // no jogo: sprite 16x20 (metade do tamanho anterior)

const HERO_PALS = {
  paula: {
    o: '#0a0a12', hd: '#3a2412', hm: '#5a3820', hl: '#8a5a30',
    sk: '#f2c9a0', ss: '#d9a074', gl: '#141018', gw: '#ffffff',
    ar: '#1b3a6b', as: '#122a52', gd: '#ffd24a', gs: '#b8860b',
    co: '#16204a', ci: '#ffd24a', bt: '#241a10'
  },
  deborah: {
    o: '#0a0a12', hd: '#0d0d0d', hm: '#242424', hl: '#3a3a3a',
    sk: '#c98a5a', ss: '#a86a3e', gl: '#e8c343', gw: '#ffffff',
    ar: '#1b3a6b', as: '#122a52', gd: '#e8c343', gs: '#b8860b',
    co: '#e8e8f0', ci: '#e8e8f0', bt: '#241a10'
  },
  matheus: {
    o: '#0a0a12', hd: '#0d0d0d', hm: '#242424', hl: '#3a3a3a',
    sk: '#e0b088', ss: '#b98a5e', gl: '#141018', gw: '#ffffff',
    ar: '#1b3a6b', as: '#122a52', gd: '#4a4f57', gs: '#2f333a',
    co: '#4a4f57', ci: '#ffd24a', bt: '#141414'
  }
};

// tinge a paleta em tons dourados (invencível / Modo Diretora)
function goldTint(pal, t) {
  const ramp = ['#fff6c0', '#ffe066', '#ffd24a', '#b8860b'];
  const shift = Math.floor(t / 6) % ramp.length;
  const out = {};
  const order = ['o', 'hd', 'hm', 'hl', 'sk', 'ss', 'gl', 'gw', 'ar', 'as', 'gd', 'gs', 'co', 'ci', 'bt'];
  const bucket = { o: 3, hd: 3, hm: 2, hl: 1, sk: 1, ss: 2, gl: 3, gw: 0, ar: 2, as: 3, gd: 0, gs: 2, co: 2, ci: 0, bt: 3 };
  for (const k of order) out[k] = ramp[(bucket[k] + shift) % ramp.length];
  return out;
}

// desenha o herói: footX = centro, footY = base (pés). p = tamanho do "pixelão".
function drawHero(charKey, footX, footY, facing, pose, frame, pal, p) {
  p = p || HERO_P;
  const ox = Math.round(footX - (HERO_GW * p) / 2);
  const oy = Math.round(footY - HERO_GH * p);
  const flip = facing < 0;
  function c(gx, gy, gw, gh, name) {
    const color = pal[name];
    if (!color) return;
    const rx = flip ? (HERO_GW - gx - gw) : gx;
    px(ox + rx * p, oy + gy * p, gw * p, gh * p, color);
  }

  // deslocamentos de animação
  let bob = 0, capeWave = 0, legA = 0, legB = 0, armShoot = false;
  if (pose === 'idle') { bob = frame === 1 ? 1 : 0; capeWave = frame === 1 ? 1 : 0; }
  else if (pose === 'run') {
    const cyc = [0, 1, 2, 1][frame % 4];
    capeWave = cyc;
    legA = [0, 2, 0, -1][frame % 4];
    legB = [0, -1, 0, 2][frame % 4];
  } else if (pose === 'jump') { legA = -1; legB = 2; capeWave = 2; }
  else if (pose === 'shoot') { armShoot = true; capeWave = 1; }

  const topY = 3 + bob;

  // ---- CAPA (só Paula) - atrás do corpo ----
  if (charKey === 'paula') {
    const cw = 3 + capeWave;
    for (let i = 0; i < 8; i++) {
      c(2 - Math.floor(capeWave / 2), 9 + i + topY - 3, cw, 1, i % 2 === 0 ? 'co' : 'ci');
    }
  }

  // ---- CABELO (atrás) ----
  if (charKey === 'paula') {
    // ondas castanhas longas dos dois lados
    c(3, topY, 10, 7, 'hm');
    for (let i = 0; i < 6; i++) { c(3, topY + 6 + i, 2, 1, i % 2 ? 'hd' : 'hm'); c(11, topY + 6 + i, 2, 1, i % 2 ? 'hd' : 'hm'); }

function bBlock(x, yTilesUp, type, extra) {
  const b = { x, y: GROUND_Y - yTilesUp * TILE, w: TILE, h: TILE, type, bump: 0, dead: false };
  return Object.assign(b, extra || {});
}

function buildLevel() {
  const platforms = [];   // segmentos de chão sólido {x0,x1}
  const blocks = [];      // ? / tijolo / sólido / escondido / usado
  const pipes = [];       // canos verdes (sólidos)
  const enemies = [];
  const coins = [];       // moedas soltas no ar

  // chão com buracos (pits) nos vãos entre segmentos
  platforms.push({ x0: 0, x1: 1300 });
  platforms.push({ x0: 1352, x1: 1980 });
  platforms.push({ x0: 2060, x1: 2500 });
  platforms.push({ x0: 2552, x1: LEVEL_W });

  const HI = GROUND_Y - 4 * TILE;   // altura padrão dos blocos flutuantes (144)

  // 2) primeiro Providência (ensina pulo na cabeça)
  enemies.push(makeProvidencia(320, 260, 430, GROUND_Y));

  // 3) primeiro ? solitário
  blocks.push(bBlock(448, 4, 'question', { item: 'coin' }));

  // 4) formação de 6 blocos (tijolo-?-tijolo-?-tijolo) + ? isolado acima do centro
  blocks.push(bBlock(560, 4, 'brick'));
  blocks.push(bBlock(576, 4, 'question', { item: 'coin' }));
  blocks.push(bBlock(592, 4, 'brick', { breakable: true }));  // este quebra
  blocks.push(bBlock(608, 4, 'question', { item: 'coin' }));
  blocks.push(bBlock(624, 4, 'brick'));
  blocks.push(bBlock(592, 7, 'question', { item: 'coin' }));

  // 5) dois Providência juntos
  enemies.push(makeProvidencia(740, 700, 800, GROUND_Y));
  enemies.push(makeProvidencia(800, 700, 860, GROUND_Y));

  // 6) sequência de 4 canos (alturas 2,3,4,4)
  pipes.push(makePipe(920, 2));
  pipes.push(makePipe(1010, 3));
  pipes.push(makePipe(1110, 4));
  pipes.push(makePipe(1200, 4));

  // 7) Achado entre os canos
  enemies.push(makeAchado(1060, 960, 1150, GROUND_Y, 55));

  // 8) bloco escondido (1-up) acima, entre canos
  blocks.push(bBlock(1065, 7, 'hidden', { item: '1up', revealed: false }));

  // 9) primeiro buraco com arco de 4 moedas (pit 1300-1352)
  coinArc(coins, 1300, 1352, 118);

  // 10) tijolo de múltiplas moedas
  blocks.push(bBlock(1430, 4, 'brick', { multi: true, coins: 6 }));

  // 11) Providência + Achado juntos
  enemies.push(makeProvidencia(1520, 1470, 1580, GROUND_Y));
  enemies.push(makeAchado(1600, 1560, 1660, GROUND_Y, 70));

  // 12) três plataformas suspensas com minion em cima
  makeFloatPlat(blocks, 1700, GROUND_Y - 3 * TILE, 3);
  enemies.push(makeProvidencia(1716, 1700, 1732, GROUND_Y - 3 * TILE));
  makeFloatPlat(blocks, 1790, GROUND_Y - 4 * TILE, 3);
  enemies.push(makeProvidencia(1806, 1790, 1822, GROUND_Y - 4 * TILE));
  makeFloatPlat(blocks, 1880, GROUND_Y - 5 * TILE, 3);
  enemies.push(makeProvidencia(1896, 1880, 1912, GROUND_Y - 5 * TILE));

  // 13) segundo buraco (mais largo) com plataforma intermediária (pit 1980-2060)
  makeFloatPlat(blocks, 2004, GROUND_Y - 2 * TILE, 2);
  coins.push(makeCoin(2012, GROUND_Y - 3 * TILE));

  // 14) escadaria ascendente (1,2,3,4)
  staircase(blocks, 2160, 4, +1);

  // 15) escadaria descendente + buraco (pit 2500-2552)
  staircase(blocks, 2360, 4, -1);
  coinArc(coins, 2500, 2552, 120);

  // 15b) mob no vão entre as duas escadarias (região que estava vazia)
  enemies.push(makeProvidencia(2290, 2232, 2350, GROUND_Y));

  // 16) corredor de moedas (respiro)
  for (let x = 2620; x <= 2980; x += 24) coins.push(makeCoin(x, GROUND_Y - 3 * TILE));

  // 17) emboscada final (mistura dos dois tipos)
  enemies.push(makeProvidencia(3020, 2990, 3070, GROUND_Y));
  enemies.push(makeAchado(3090, 3060, 3130, GROUND_Y, 50));
  enemies.push(makeProvidencia(3150, 3120, 3200, GROUND_Y));

  // 18) cano final + porta da arena
  pipes.push(makePipe(3210, 3));

  // chefe voando na arena
  const boss = makeBoss();

  return {
    platforms, blocks, pipes, enemies, coins,
    boss, playerShots: [], bossProjectiles: [], fragments: [], pops: [],
    width: LEVEL_W, startX: 30, startY: GROUND_Y - PLAYER_H,
    checkpointX: 30, bossCheckpoint: false,
    midX: 1760, midReached: false      // checkpoint no meio da fase
  };
}

function makePipe(x, hTiles) {
  return { x, y: GROUND_Y - hTiles * TILE, w: 28, h: hTiles * TILE, type: 'pipe' };
}
function makeFloatPlat(blocks, x, y, n) {
  for (let i = 0; i < n; i++) blocks.push({ x: x + i * TILE, y, w: TILE, h: TILE, type: 'solid', bump: 0, dead: false });
}
function staircase(blocks, x, maxH, dir) {
  for (let i = 0; i < maxH; i++) {
    const h = dir > 0 ? (i + 1) : (maxH - i);
    for (let j = 0; j < h; j++) {
      blocks.push({ x: x + i * TILE, y: GROUND_Y - (j + 1) * TILE, w: TILE, h: TILE, type: 'solid', bump: 0, dead: false });
    }
  }
}
function coinArc(coins, x0, x1, peakY) {
  const n = 4, span = x1 - x0;
  for (let i = 0; i < n; i++) {
    const t = (i + 0.5) / n;
    const x = x0 + t * span;
    const y = peakY + Math.sin(t * Math.PI) * -24;
    coins.push(makeCoin(x, y));
  }
}
function makeCoin(x, y) { return { x, y, w: 10, h: 12, taken: false, anim: Math.floor(Math.random() * 4), spawnBounce: 0 }; }

function makeProvidencia(x, minX, maxX, topY) {
  return { type: 'providencia', name: 'PROVIDÊNCIA', x, y: topY - 14, w: 16, h: 14,
    minX, maxX, dir: -1, speed: 0.45, hp: 2, maxHp: 2, flashTimer: 0, dead: false, anim: 0, summoned: false };
}
function makeAchado(x, minX, maxX, topY, jumpDelay) {
  return { type: 'achado', name: 'ACHADO', x, y: topY - 14, w: 14, h: 12, baseY: topY - 14,
    minX, maxX, dir: 1, speed: 0.8, vy: 0, onGround: true, jumpDelay, jumpTimer: jumpDelay,
    hp: 1, maxHp: 1, flashTimer: 0, dead: false };
}
function makeBoss() {
  return {
    name: STAGE.boss.name, x: ARENA_X + 180, y: 90, w: 44, h: 40,
    hp: STAGE.boss.hp, maxHp: STAGE.boss.hp, flashTimer: 0, defeated: false, deathTimer: 0,
    aggro: false, breathe: 0,
    mode: 'move', modeTimer: 60, tx: ARENA_X + 180, ty: 90,
    attackIdx: 0, telegraph: 0, diveVX: 0, diveVY: 0
  };
}

/* =========================================================================
   FÍSICA E COLISÃO
   ========================================================================= */
function rectsOverlap(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

// blocos/canos sólidos correntes (escondidos só contam após revelados)
function solidRects() {
  const list = [];
  for (const b of level.blocks) { if (b.dead) continue; if (b.type === 'hidden' && !b.revealed) continue; list.push(b); }
  for (const p of level.pipes) list.push(p);
  return list;
}
function onGroundSegment(x) {
  for (const s of level.platforms) if (x >= s.x0 && x <= s.x1) return true;
  return false;
}

function fireShot() {
  const word = SHOT_WORDS[shotWordIndex];
  shotWordIndex = (shotWordIndex + 1) % SHOT_WORDS.length;
  ctx.font = 'bold 6px monospace';
  const tw = Math.ceil(ctx.measureText(word).width);
  const w = tw + 8, h = 12;
  level.playerShots.push({
    x: player.facing > 0 ? player.x + player.w : player.x - w,
    y: player.y + 8, vx: player.facing * 1.9, w, h, word   // metade da velocidade antiga, maior
  });
}

function updatePlayer() {
  // Modo Diretora (só Paula)
  if (player.charKey === 'paula') {
    if (player.power.active > 0) player.power.active--;
    if (player.power.cooldown > 0) player.power.cooldown--;
    if (keysPressedThisFrame.power && player.power.active === 0 && player.power.cooldown === 0) {
      player.power.active = POWER_DURATION;
      player.power.cooldown = POWER_DURATION + POWER_COOLDOWN;
      SFX.power();
    }
  }
  const powered = player.power.active > 0;

  // horizontal (Modo Diretora = velocidade 3x)
  const spd = powered ? MOVE_SPEED * 3 : MOVE_SPEED;
  if (keys.left) { player.vx -= spd * 0.35; player.facing = -1; }
  if (keys.right) { player.vx += spd * 0.35; player.facing = 1; }
  player.vx *= FRICTION;
  if (Math.abs(player.vx) < 0.05) player.vx = 0;
  player.vx = Math.max(-spd, Math.min(spd, player.vx));
  player.x += player.vx;
  if (player.x < 0) player.x = 0;
  if (player.x > level.width - player.w) player.x = level.width - player.w;
  // dentro da arena do chefe não é possível sair (parede à esquerda)
  if (level.bossCheckpoint && player.x < ARENA_X) { player.x = ARENA_X; player.vx = 0; }

  const solids = solidRects();
  // colisão horizontal
  for (const p of solids) {
    if (rectsOverlap(player, p)) {
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }

  // pulo
  if (keysPressedThisFrame.up && player.onGround) { player.vy = JUMP_VELOCITY; player.onGround = false; SFX.jump(); }

  // vertical
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  player.y += player.vy;
  const wasFalling = player.vy > 0;
  player.onGround = false;

  // colisão vertical com blocos/canos
  for (const p of solids) {
    if (rectsOverlap(player, p)) {
      if (player.vy > 0 && (player.y + player.h - player.vy) <= p.y + 1) {
        player.y = p.y - player.h; player.vy = 0; player.onGround = true;
      } else if (player.vy < 0 && (player.y - player.vy) >= p.y + p.h - 1) {
        player.y = p.y + p.h; player.vy = 0;
        bumpBlock(p);   // cabeçada por baixo
      }
    }
  }
  // chão contínuo
  if (wasFalling && player.y + player.h >= GROUND_Y && (player.y + player.h - player.vy) <= GROUND_Y + 6) {
    if (onGroundSegment(player.x + player.w / 2) || onGroundSegment(player.x) || onGroundSegment(player.x + player.w)) {
      player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true;
    }
  }
  // revela bloco escondido ao subir através dele
  if (player.vy < 0) {
    for (const b of level.blocks) {
      if (b.type === 'hidden' && !b.revealed && rectsOverlap(player, b)) {
        player.vy = 0; player.y = b.y + b.h; bumpBlock(b);
      }
    }
  }

  // caiu num buraco
  if (player.y > H + 30) { damagePlayer(true); return; }

  // animação
  player.animTimer++;
  if (Math.abs(player.vx) > 0.2 && player.onGround) {
    if (player.animTimer > 6) { player.animFrame = (player.animFrame + 1) % 4; player.animTimer = 0; }
  } else if (player.onGround) {
    if (player.animTimer > 30) { player.animFrame = player.animFrame === 0 ? 1 : 0; player.animTimer = 0; }
  }

  if (player.invincible > 0) player.invincible--;
  if (player.attackCooldown > 0) player.attackCooldown--;
  if (player.attackTimer > 0) player.attackTimer--;
  if (keysPressedThisFrame.attack && player.attackCooldown === 0) {
    player.attackTimer = 10; player.attackCooldown = 26; fireShot(); SFX.shoot();
  }

  // checkpoint no meio da fase
  if (!level.midReached && player.x > level.midX) {
    level.midReached = true; level.checkpointX = level.midX; SFX.checkpoint();
  }
  // checkpoint ao entrar na arena (a partir daqui sempre renasce na arena)
  if (!level.bossCheckpoint && player.x > ARENA_X) {
    level.bossCheckpoint = true; level.checkpointX = ARENA_X + 20; level.boss.aggro = true;
  }

  // câmera
  camX = player.x - W / 2 + player.w / 2;
  camX = Math.max(0, Math.min(level.width - W, camX));
}

// cabeçada em bloco por baixo
function bumpBlock(b) {
  if (b.type === 'pipe' || b.type === 'solid') { SFX.bump(); b.bump = 6; return; }
  if (b.type === 'used' || b.dead) { SFX.bump(); b.bump = 4; return; }
  b.bump = 8;
  if (b.type === 'question') {
    SFX.bump();
    if (b.item === '1up') { spawnBlockCoin(b, true); }
    else spawnBlockCoin(b, false);
    b.type = 'used';
  } else if (b.type === 'hidden') {
    b.revealed = true; SFX.bump();
    spawnBlockCoin(b, b.item === '1up');
    b.type = 'used';
  } else if (b.type === 'brick') {
    if (b.multi && b.coins > 0) {
      b.coins--; spawnBlockCoin(b, false); SFX.bump();
      if (b.coins === 0) b.type = 'used';
    } else if (b.breakable) {
      SFX.brick(); breakBrick(b); b.dead = true;
    } else {
      SFX.bump();   // tijolo estrutural: só balança
    }
  }
}
function spawnBlockCoin(b, isOneUp) {
  if (isOneUp) {
    player.lives++; SFX.oneup();
    level.pops.push({ x: b.x + 2, y: b.y - 4, text: '1UP', timer: 60, color: '#5ade9a' });
  } else {
    player.coins++; player.score += 100; SFX.coin();
    level.pops.push({ x: b.x + 3, y: b.y - 4, text: '+100', timer: 45, color: '#ffe066' });
  }
}
function breakBrick(b) {
  for (let i = 0; i < 4; i++) {
    level.fragments.push({
      x: b.x + (i % 2) * 8, y: b.y + Math.floor(i / 2) * 8,
      vx: (i % 2 === 0 ? -1.4 : 1.4), vy: -3 - Math.random(), w: 7, h: 7
    });
  }
}

function damagePlayer(fell) {
  if (!fell && (player.invincible > 0 || player.power.active > 0)) return;
  player.lives--;
  SFX.hurt();
  hitStop = 8;
  if (player.lives <= 0) {
    player.lives = 0; gameState = STATE.GAME_OVER; stateTimer = 0; hitStop = 0; SFX.gameOver();
    return;
  }
  respawnPlayer(level.checkpointX);
  if (level.bossCheckpoint) resetBoss();
}

/* =========================================================================
   INIMIGOS
   ========================================================================= */
function killEnemy(e, pts) { e.dead = true; player.score += pts; SFX.stomp(); }
function hitEnemy(e) {
  e.hp--; e.flashTimer = 8; SFX.hit();
  if (e.hp <= 0) { e.dead = true; player.score += 150; SFX.defeat(); }
}
function updateEnemies() {
  const powered = player.power.active > 0;
  for (const e of level.enemies) {
    if (e.dead) continue;
    if (e.flashTimer > 0) e.flashTimer--;

    if (e.type === 'providencia') {
      e.x += e.dir * e.speed;
      if (e.x <= e.minX) { e.x = e.minX; e.dir = 1; }
      if (e.x >= e.maxX) { e.x = e.maxX; e.dir = -1; }
      e.anim++;
    } else {
      if (e.onGround) {
        e.jumpTimer--;
        if (e.jumpTimer <= 0) { e.vy = -3.9; e.onGround = false; e.jumpTimer = e.jumpDelay; }
      } else {
        e.x += e.dir * e.speed; e.vy += GRAVITY * 0.6; e.y += e.vy;
        if (e.y >= e.baseY) { e.y = e.baseY; e.vy = 0; e.onGround = true; }
      }
      if (e.x <= e.minX) { e.x = e.minX; e.dir = 1; }
      if (e.x >= e.maxX) { e.x = e.maxX; e.dir = -1; }
    }

    if (rectsOverlap(player, e)) {
      const prevBottom = player.y + player.h - player.vy;
      if (powered) { killEnemy(e, 200); }
      else if (player.vy > 0 && prevBottom <= e.y + 5) {
        killEnemy(e, 200); player.vy = STOMP_BOUNCE; player.onGround = false;
      } else {
        damagePlayer(false);
      }
    }
  }
}

/* =========================================================================
   CHEFE — voa/mergulha na arena, 3 padrões, dano só por tiro
   ========================================================================= */
// faixa de altura de voo mantida dentro do alcance do tiro (em pé ou no pulo),
// para nunca ficar tempo demais fora de alcance por causa da física do salto
const BOSS_FLY_MIN_Y = 90, BOSS_FLY_RANGE_Y = 75;
const BOSS_DIVE_SPEED = 3.3;   // antes 5.2 — mergulho mais lento e reagível

// reposiciona o chefe após o jogador levar um hit, SEM apagar o dano já causado
// (só uma derrota total do jogador reinicia a fase e recria o chefe do zero)
function resetBoss() {
  const b = level.boss;
  b.x = ARENA_X + 180; b.y = 90; b.tx = b.x; b.ty = b.y;
  b.mode = 'move'; b.modeTimer = 60; b.telegraph = 0;
  level.bossProjectiles.length = 0;
  level.enemies = level.enemies.filter((e) => !e.summoned);
}
function hitBoss() {
  const b = level.boss;
  if (b.defeated || !b.aggro) return;
  b.hp--; b.flashTimer = 8; hitStop = 3; SFX.hit();
  if (b.hp <= 0) {
    b.hp = 0; b.defeated = true; b.deathTimer = 140;
    level.bossProjectiles.length = 0; player.score += 800; SFX.defeat();
  }
}
function bossThrow(b) {
  const dir = player.x < b.x ? -1 : 1;
  for (let i = 0; i < 3; i++) {
    level.bossProjectiles.push({ x: b.x + b.w / 2, y: b.y + b.h / 2,
      vx: dir * (0.9 + i * 0.5), vy: -(1.6 + i * 0.6), w: 11, h: 9 });
  }
}
function bossSummon(b) {
  const alive = level.enemies.filter((e) => e.summoned && !e.dead).length;
  for (let i = alive; i < 2; i++) {
    const m = makeProvidencia(ARENA_X + 40 + i * 30, ARENA_X + 20, LEVEL_W - 30, GROUND_Y);
    m.summoned = true; level.enemies.push(m);
  }
  SFX.summon();
}
function updateBoss() {
  const b = level.boss;
  if (!b) return;
  if (b.defeated) { if (b.deathTimer > 0) b.deathTimer--; return; }
  if (b.flashTimer > 0) b.flashTimer--;
  b.breathe += 0.06;
  if (!b.aggro) return;

  const minX = ARENA_X + 20, maxX = LEVEL_W - b.w - 20;

  if (b.mode === 'move') {
    // voa suave rumo a um alvo semi-aleatório
    b.x += (b.tx - b.x) * 0.04;
    b.y += (b.ty - b.y) * 0.04 + Math.sin(b.breathe) * 0.4;
    b.modeTimer--;
    if (b.modeTimer <= 0) {
      // decide: novo destino ou um ataque
      const roll = Math.random();
      if (roll < 0.5) {
        b.tx = minX + Math.random() * (maxX - minX);
        b.ty = BOSS_FLY_MIN_Y + Math.random() * BOSS_FLY_RANGE_Y;
        b.modeTimer = 60 + Math.random() * 40;
      } else {
        const pattern = b.attackIdx % 3; b.attackIdx++;
        if (pattern === 0) { bossThrow(b); b.modeTimer = 90; }
        else if (pattern === 1) { bossSummon(b); b.modeTimer = 110; }
        else { b.mode = 'telegraph'; b.telegraph = 58; }
      }
    }
  } else if (b.mode === 'telegraph') {
    // pisca antes do mergulho para dar tempo de reação
    b.telegraph--;
    if (b.telegraph <= 0) {
      const dx = (player.x + player.w / 2) - (b.x + b.w / 2);
      const dy = (player.y) - b.y;
      const d = Math.max(40, Math.hypot(dx, dy));
      b.diveVX = (dx / d) * BOSS_DIVE_SPEED; b.diveVY = (dy / d) * BOSS_DIVE_SPEED;
      b.mode = 'dive'; b.modeTimer = 42; SFX.dive();
    }
  } else if (b.mode === 'dive') {
    b.x += b.diveVX; b.y += b.diveVY;
    if (b.x < minX) { b.x = minX; b.diveVX *= -1; }
    if (b.x > maxX) { b.x = maxX; b.diveVX *= -1; }
    if (b.y > GROUND_Y - b.h - 6) { b.y = GROUND_Y - b.h - 6; b.diveVY = -Math.abs(b.diveVY); }
    b.modeTimer--;
    if (b.modeTimer <= 0) {
      b.mode = 'move'; b.modeTimer = 40;
      b.tx = minX + Math.random() * (maxX - minX); b.ty = BOSS_FLY_MIN_Y + Math.random() * BOSS_FLY_RANGE_Y;
    }
  }

  if (rectsOverlap(player, b)) damagePlayer(false);
}
function updateBossProjectiles() {
  for (let i = level.bossProjectiles.length - 1; i >= 0; i--) {
    const pr = level.bossProjectiles[i];
    pr.vy += 0.12; pr.x += pr.vx; pr.y += pr.vy;
    if (rectsOverlap(pr, player)) { damagePlayer(false); level.bossProjectiles.splice(i, 1); continue; }
    if (pr.y > H + 20 || pr.x < camX - 40 || pr.x > camX + W + 40) level.bossProjectiles.splice(i, 1);
  }
}

/* =========================================================================
   PROJÉTEIS DA JOGADORA / MOEDAS / FRAGMENTOS / POPUPS
   ========================================================================= */
function updateShots() {
  const shots = level.playerShots;
  const solids = solidRects();
  for (let i = shots.length - 1; i >= 0; i--) {
    const s = shots[i]; s.x += s.vx;
    let gone = s.x + s.w < camX - 20 || s.x > camX + W + 20;
    if (!gone) for (const p of solids) { if (rectsOverlap(s, p)) { gone = true; break; } }
    if (!gone) for (const e of level.enemies) { if (!e.dead && rectsOverlap(s, e)) { hitEnemy(e); gone = true; break; } }
    const b = level.boss;
    if (!gone && b && !b.defeated && b.aggro && rectsOverlap(s, b)) { hitBoss(); gone = true; }
    if (gone) shots.splice(i, 1);
  }
}
function updateCoins() {
  for (const c of level.coins) {
    if (c.taken) continue;
    c.anim = (c.anim + 0.15) % 4;
    if (rectsOverlap({ x: c.x, y: c.y, w: c.w, h: c.h }, player)) {
      c.taken = true; player.coins++; player.score += 100; SFX.coin();
      level.pops.push({ x: c.x, y: c.y, text: '+100', timer: 45, color: '#ffe066' });
    }
  }
}
function updateFragments() {
  for (let i = level.fragments.length - 1; i >= 0; i--) {
    const f = level.fragments[i]; f.vy += GRAVITY; f.x += f.vx; f.y += f.vy;
    if (f.y > H + 20) level.fragments.splice(i, 1);
  }
}
function updatePops() {
  for (let i = level.pops.length - 1; i >= 0; i--) {
    const p = level.pops[i]; p.y -= 0.5; p.timer--;
    if (p.timer <= 0) level.pops.splice(i, 1);
  }
}
function updateBlockBumps() {
  for (const b of level.blocks) if (b.bump > 0) b.bump--;
  for (const p of level.pipes) if (p.bump > 0) p.bump--;
}

/* =========================================================================
   GAME 2 — "VOO DA ARARA" (estilo Flappy Bird)
   Jogo separado, próprio menu de seleção, reaproveita só o cenário de fundo
   (drawFieldBackground) e o chão (mesma altura GROUND_Y) do Game 1.
   ========================================================================= */
const GRAVITY2 = 0.3;           // gravidade por frame (suave)
const FLAP_VY = -5.4;           // impulso do voo (substitui a velocidade, não soma)
const GAP2 = 130;               // vão inicial (fase 0-50) entre coluna de cima e de baixo
const GAP2_MIN = 58;            // vão mínimo absoluto — sempre voável mesmo no teto de dificuldade
const PIPE_W = 34;              // largura de cada coluna de obstáculo
const MARGIN2 = 22;             // margem mínima do vão até o teto/chão (espaço p/ a placa caber dentro do hitbox)
const BIRD_X = Math.round(W * 0.25);  // a arara fica fixa na horizontal
const BIRD_W = 16, BIRD_H = 12;       // hitbox (menor que o sprite — mais generosa)
const G2_BG_SCROLL = 1.6;             // drift do cenário na tela inicial

const PIPE_SPEED_BASE = 1.3, PIPE_SPACING_BASE = 175;

// dificuldade por marcos de pontuação (interpolação linear entre pontos vizinhos):
//   0-13   rampa suave (dá tempo de ler as placas)
//   13-50  como já era antes (só um pouco mais rápido)
//   50-100 e 100-150 continuam ficando mais rápido/apertado — antes ficava "parado"
//          nessa faixa porque batia num teto cedo demais
//   150+   segue subindo até um teto final bem mais alto, pra sempre sobrar desafio
const G2_DIFFICULTY_POINTS = [
  { score: 0,   speed: PIPE_SPEED_BASE, spacing: PIPE_SPACING_BASE, gap: GAP2, jitter: 0 },
  { score: 13,  speed: 2.4,             spacing: 135,               gap: GAP2, jitter: 0 },
  { score: 50,  speed: 3.4,             spacing: 115,               gap: GAP2, jitter: 0 },
  { score: 100, speed: 4.5,             spacing: 95,                gap: 95,   jitter: 16 },
  { score: 150, speed: 5.6,             spacing: 78,                gap: 75,   jitter: 20 },
  { score: 250, speed: 6.6,             spacing: 62,                gap: GAP2_MIN, jitter: 24 }
];

function lerpG2(a, b, key, t) { return a[key] + (b[key] - a[key]) * t; }

function computeG2Difficulty(score) {
  const pts = G2_DIFFICULTY_POINTS;
  if (score <= pts[0].score) return pts[0];
  for (let i = 1; i < pts.length; i++) {
    if (score <= pts[i].score) {
      const a = pts[i - 1], b = pts[i];
      const t = (score - a.score) / (b.score - a.score);
      return {
        speed: lerpG2(a, b, 'speed', t), spacing: lerpG2(a, b, 'spacing', t),
        gap: lerpG2(a, b, 'gap', t), jitter: lerpG2(a, b, 'jitter', t)
      };
    }
  }
  return pts[pts.length - 1];
}

const G2_DIFFICULTIES = [
  'PLS', 'CNJ', 'SERVIDOR CHATO', 'DEMANDA EM EXCESSO', 'PRAZO ESTOURANDO',

const G2_MEDALS = ['🥇', '🥈', '🥉'];
const G2_LB_PAGE_SIZE = 20;
let g2LbPage = 1;
let g2LbTotal = 0;

function g2LbTotalPages() { return Math.max(1, Math.ceil(g2LbTotal / G2_LB_PAGE_SIZE)); }

async function loadLeaderboardPage(page) {
  leaderboardList.innerHTML = '<div class="lbRow lbLoading">Carregando...</div>';
  leaderboardPager.style.visibility = 'hidden';
  try {
    const resp = await fetch(`/api/pontuacoes?page=${page}&pageSize=${G2_LB_PAGE_SIZE}`);
    const data = await resp.json();
    const items = Array.isArray(data.items) ? data.items : [];
    g2LbPage = data.page || page;
    g2LbTotal = data.total || 0;

    if (items.length === 0) {
      leaderboardList.innerHTML = g2LbPage === 1
        ? '<div class="lbRow lbLoading">Ninguém voou ainda. Seja o primeiro!</div>'
        : '<div class="lbRow lbLoading">Não tem mais pontuações aqui.</div>';
    } else {
      const baseRank = (g2LbPage - 1) * G2_LB_PAGE_SIZE;
      leaderboardList.innerHTML = items.map((row, i) => {
        const rank = baseRank + i + 1;
        const ehGabdigep = String(row.unidade || '').trim().toUpperCase() === 'GABDIGEP';
        // GABDIGEP não vale medalha (é a equipe que fez o jogo) -- mostra X no lugar,
        // mas a linha continua contando normalmente na posição do ranking.
        const posLabel = ehGabdigep ? '✗' : (G2_MEDALS[rank - 1] || (rank + 'º'));
        const topClass = rank <= 3 ? ` lbTop${rank}` : '';
        const unidadeHtml = escapeHtml(row.unidade || '') +
          (ehGabdigep ? ' <span class="lbCheat">🍬 não vale, marmelada de dev!</span>' : '');
        return `<div class="lbRow${topClass}">
          <span class="lbPos">${posLabel}</span>
          <span class="lbInfo">
            <span class="lbName">${escapeHtml(row.nome)}</span>
            <span class="lbUnidade">${unidadeHtml}</span>
          </span>
          <span class="lbScore">${escapeHtml(row.pontuacao)}</span>
        </div>`;
      }).join('');
    }

    const totalPages = g2LbTotalPages();
    leaderboardPageLabel.textContent = `Página ${g2LbPage} de ${totalPages}`;
    leaderboardPrevBtn.disabled = g2LbPage <= 1;
    leaderboardNextBtn.disabled = g2LbPage >= totalPages;
    leaderboardPager.style.visibility = totalPages > 1 ? 'visible' : 'hidden';
  } catch (e) {
    leaderboardList.innerHTML = '<div class="lbRow lbLoading">Não consegui carregar o placar agora.</div>';
    leaderboardPager.style.visibility = 'hidden';
  }
}

// sorteia a próxima dificuldade sem repetir a anterior
// sorteia uma frase pra coluna de cima e outra pra de baixo do MESMO obstáculo —
// nunca repete a mesma frase nas duas colunas, nem repete a última frase usada
// (na coluna de baixo do obstáculo anterior) logo de cara.
function pickG2DifficultyPair() {
  const n = G2_DIFFICULTIES.length;
  let idxTop;
  do { idxTop = Math.floor(Math.random() * n); } while (idxTop === g2.lastDiffIdx && n > 1);
  let idxBottom;
  do { idxBottom = Math.floor(Math.random() * n); } while (idxBottom === idxTop && n > 1);
  g2.lastDiffIdx = idxBottom;
  return [G2_DIFFICULTIES[idxTop], G2_DIFFICULTIES[idxBottom]];
}
function spawnG2Pipe() {
  const diff = computeG2Difficulty(g2.score);
  // o vão varia de tamanho (jitter) além de mudar de posição — evita que o padrão
  // fique previsível e, com o vão menor, a faixa de posições possíveis se abre mais,
  // obrigando a arara a buscar o topo ou o fundo da tela, não só o meio.
  const jitterAmt = diff.jitter ? (Math.random() * 2 - 1) * diff.jitter : 0;
  const gapSize = Math.max(GAP2_MIN, Math.min(GAP2, diff.gap + jitterAmt));
  const rangeMax = Math.max(MARGIN2, GROUND_Y - gapSize - MARGIN2);
  const gapTop = MARGIN2 + Math.random() * (rangeMax - MARGIN2);
  const [labelTop, labelBottom] = pickG2DifficultyPair();
  g2.pipes.push({ x: W + PIPE_W, w: PIPE_W, gapTop, gapSize, scored: false, labelTop, labelBottom });
}

function updateGame2() {
  const flap = keysPressedThisFrame.up || clickPoint !== null;
  updateG2Anim();

  // congelado esperando o 1º flap real: nada se move, evita a queda instantânea
  if (!g2.started) {
    if (flap) { g2.started = true; g2.vy = FLAP_VY; SFX.flap(); }
    return;
  }

  if (flap) { g2.vy = FLAP_VY; SFX.flap(); }
  g2.vy += GRAVITY2;
  g2.y += g2.vy;
  g2.rot = Math.max(-0.32, Math.min(1.2, g2.vy * 0.1));

  // dificuldade por marcos de pontuação (ver computeG2Difficulty)
  const diff = computeG2Difficulty(g2.score);
  g2.speed = diff.speed;
  g2.spacing = diff.spacing;

  // espaçamento por distância (não por tempo) — mantém o "ritmo" visual mesmo com a velocidade mudando
  g2.spawnTimer -= g2.speed;
  if (g2.spawnTimer <= 0) { spawnG2Pipe(); g2.spawnTimer += g2.spacing; }

  for (let i = g2.pipes.length - 1; i >= 0; i--) {
    const p = g2.pipes[i];
    p.x -= g2.speed;
    if (!p.scored && p.x + p.w < BIRD_X - BIRD_W / 2) { p.scored = true; g2.score++; SFX.point(); }
    if (p.x + p.w < -20) g2.pipes.splice(i, 1);
  }
  camX += g2.speed;   // alimenta o parallax do cenário compartilhado

  const bx0 = BIRD_X - BIRD_W / 2, by0 = g2.y - BIRD_H / 2;
  let hitReason = null;
  if (by0 <= 0) hitReason = 'TETO BAIXO';
  else if (by0 + BIRD_H >= GROUND_Y) hitReason = 'CHÃO DO FÓRUM';
  for (const p of g2.pipes) {
    if (bx0 + BIRD_W > p.x && bx0 < p.x + p.w) {
      if (by0 < p.gapTop) hitReason = p.labelTop;
      else if (by0 + BIRD_H > p.gapTop + p.gapSize) hitReason = p.labelBottom;
    }
  }
  if (hitReason) {
    g2.dead = true; g2.deathReason = hitReason;
    if (g2.score > g2Best) g2Best = g2.score;
    SFX.crash();
    gameState = STATE.G2_OVER; stateTimer = 0;
    submitG2Score();
  }
}

// quebra o texto da placa em linhas que caibam na largura da coluna
function wrapPixLabel(text, maxWidth, fontSize) {
  ctx.font = 'bold ' + fontSize + 'px monospace';
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (cur && ctx.measureText(test).width > maxWidth) { lines.push(cur); cur = w; }
    else cur = test;
  }
  if (cur) lines.push(cur);
  return lines;
}

// coluna de processos empilhados, com uma "capa" de pasta na ponta voltada pro vão.
// O nome da dificuldade é pintado DENTRO da capa — mesma largura/altura do hitbox,
// nunca projeta pra fora da coluna, então não há dúvida sobre onde é seguro voar.
function drawG2StackSegment(x, y, w, h, capAtBottom, label) {
  if (h <= 0) return;
  const paper = '#e8d4a0', line = '#a8834a', red = '#c0392b', capC = '#1b3a6b', capL = '#2c5a8a', capD = '#0f2340';
  const lh = 7;
  let lines = label ? wrapPixLabel(label, w - 4, 5) : [];
  const maxLines = Math.max(1, Math.floor((h - 6) / lh));
  if (lines.length > maxLines) lines = lines.slice(0, maxLines);
  const capH = label ? Math.min(h, lines.length * lh + 6) : Math.min(10, h);
  const bodyH = h - capH;
  const bodyY = capAtBottom ? y : y + capH;
  if (bodyH > 0) {
    px(x, bodyY, w, bodyH, paper);
    for (let sy = bodyY; sy < bodyY + bodyH; sy += 7) px(x, sy, w, 1, line);
    px(x, bodyY, 2, bodyH, line); px(x + w - 2, bodyY, 2, bodyH, line);
    if (bodyH > 18) px(x + 2, bodyY + bodyH / 2 - 2, w - 4, 4, red);
  }
  const capY = capAtBottom ? y + bodyH : y;
  px(x, capY, w, capH, capC);
  px(x, capY, w, 2, capL);
  px(x, capY + capH - 2, w, 2, capD);
  for (let i = 0; i < lines.length; i++) pixText(lines[i], x + w / 2, capY + 8 + i * lh, '#ffe066', 5);
}
function drawG2Pipe(p) {
  const sx = p.x;
  if (sx + p.w < -10 || sx > W + 10) return;
  drawG2StackSegment(sx, 0, p.w, p.gapTop, true, p.labelTop);                                   // coluna pendurada do teto
  drawG2StackSegment(sx, p.gapTop + p.gapSize, p.w, GROUND_Y - (p.gapTop + p.gapSize), false, p.labelBottom); // coluna erguida do chão
}

// arara-azul jogável: contorno preto, anel amarelo no olho, bico preto, asa animada
function drawG2Bird(cx, cy, rot, frame) {

  const wingDy = frame === 1 ? -3 : (frame === 2 ? 3 : 0);

  // silhueta (contorno preto), desenhada antes das partes coloridas

  px(-13, wingDy - 1, 11, 7, outline);
  px(-13, -3, 5, 7, outline);
  px(11, -6, 7, 5, outline);

  px(-9, -6, 17, 12, body);

}

/* =========================================================================
   LOOP PRINCIPAL — UPDATE
   ========================================================================= */
function update() {
  stateTimer++;
  if (audioUnlocked && !musicPlaying) startMusic();

  if (overlayActive) { clearFrameInputs(); return; }
  if (hitStop > 0) { hitStop--; clearFrameInputs(); return; }

  const confirm = keysPressedThisFrame.enter || keysPressedThisFrame.attack || keysPressedThisFrame.up;

  if (gameState === STATE.TITLE) {
    if (stateTimer > 20 && (clickPoint || keysPressedThisFrame.any)) { goToGameSelect(); }
  } else if (gameState === STATE.GAME_SELECT) {
    if (keysPressedThisFrame.esc) { backToTitle(); }
    else if (stateTimer > 20) {
      if (selectCooldown > 0) selectCooldown--;
      if (selectCooldown === 0) {
        if (keys.left) { gameSelectHighlight = 0; selectCooldown = 12; }
        else if (keys.right) { gameSelectHighlight = 1; selectCooldown = 12; }
      }
      const lbRect = getLeaderboardLinkRect();
      if (pointInRect(clickPoint, lbRect.x, lbRect.y, lbRect.w, lbRect.h)) {
        showLeaderboard();
      } else {
        let chosen = -1;
        const clickedCard = hitTestGames(clickPoint);
        if (clickedCard >= 0) { gameSelectHighlight = clickedCard; chosen = clickedCard; }
        else if (confirm) chosen = gameSelectHighlight;
        if (chosen === 0) { gameState = STATE.CHAR_SELECT; stateTimer = 0; }
        else if (chosen === 1) { if (playerName) startGame2Intro(); else showNameEntry(); }
      }
    }
  } else if (gameState === STATE.CHAR_SELECT) {
    if (keysPressedThisFrame.esc) { goToGameSelect(); }
    else if (stateTimer > 20) {
      const order = ['deborah', 'paula', 'matheus'];
      let idx = order.indexOf(charSelectHighlight);
      if (selectCooldown > 0) selectCooldown--;
      if (selectCooldown === 0) {
        if (keys.left) { idx = (idx + 2) % 3; selectCooldown = 12; }
        else if (keys.right) { idx = (idx + 1) % 3; selectCooldown = 12; }
      }
      charSelectHighlight = order[idx];
      const clicked = hitTestChars(clickPoint);
      if (clicked) chooseCharacterAndStart(clicked);
      else if (confirm) chooseCharacterAndStart(charSelectHighlight);
    }
  } else if (gameState === STATE.INTRO) {
    if (keysPressedThisFrame.esc) { gameState = STATE.CHAR_SELECT; stateTimer = 0; }
    else if (stateTimer > 180 || (stateTimer > 40 && (confirm || clickPoint))) {
      gameState = STATE.PLAYING; stateTimer = 0;
    }
  } else if (gameState === STATE.PLAYING) {
    if (keysPressedThisFrame.esc) { backToTitle(); }
    else {
      updatePlayer();
      if (gameState === STATE.PLAYING) {
        updateEnemies(); updateBoss(); updateBossProjectiles();
        updateShots(); updateCoins(); updateFragments(); updatePops(); updateBlockBumps();
        if (level.boss.defeated && level.boss.deathTimer <= 0) {
          gameState = STATE.STAGE_CLEAR; stateTimer = 0; SFX.stageClear();
        }
      }
    }
  } else if (gameState === STATE.STAGE_CLEAR) {
    if (stateTimer > 160 || (stateTimer > 60 && (clickPoint || keysPressedThisFrame.any))) {
      gameState = STATE.VICTORY; stateTimer = 0; initConfetti(); SFX.victory();
    }
  } else if (gameState === STATE.GAME_OVER) {
    if (keysPressedThisFrame.esc) goToGameSelect();
    else if (stateTimer > 40 && (clickPoint || confirm)) startStage();
  } else if (gameState === STATE.VICTORY) {
    updateConfetti();
    if (keysPressedThisFrame.esc || (stateTimer > 50 && (clickPoint || confirm))) goToGameSelect();
  } else if (gameState === STATE.G2_INTRO) {
    if (keysPressedThisFrame.esc) { goToGameSelect(); }
    else {
      camX += G2_BG_SCROLL;
      updateG2Anim();
      if (stateTimer > 15 && (confirm || clickPoint)) startGame2Play();
    }
  } else if (gameState === STATE.G2_PLAYING) {
    if (keysPressedThisFrame.esc) { goToGameSelect(); }
    else { updateGame2(); }
  } else if (gameState === STATE.G2_OVER) {
    if (keysPressedThisFrame.esc) { goToGameSelect(); }
    else if (stateTimer > 20) {
      const clicked = hitTestG2Over(clickPoint);
      if (clicked === 'back') goToGameSelect();
      else if (clicked === 'leaderboard') showLeaderboard();
      else if (clicked === 'retry' || confirm) startGame2Play();
    }
  }

  clearFrameInputs();
}
function clearFrameInputs() {
  keysPressedThisFrame.up = false;
  keysPressedThisFrame.attack = false;
  keysPressedThisFrame.power = false;
  keysPressedThisFrame.esc = false;
  keysPressedThisFrame.enter = false;
  keysPressedThisFrame.any = false;
  clickPoint = null;
}

// Palácio da Justiça do TJTO em pixel art (tijolo vermelho + arcos + brasão dourado)
function drawPalacioTJTO(sx, baseY) {
  const brick = '#b5502a', brickD = '#7a2e14', brickL = '#d97a4a';
  const glass = '#12202e', glassL = '#20364a', gold = '#e0b23a', goldD = '#a87a1e', stone = '#c9b89a';
  const bw = 168, bh = 96, bx = sx, by = baseY - bh;

  // escadaria de granito na base
  for (let i = 0; i < 4; i++) px(bx - 6 + i * 2, baseY - 4 + i, bw + 12 - i * 4, 2, i % 2 ? '#b8a888' : stone);

  // fachada de tijolo
  px(bx, by, bw, bh - 4, brick);
  px(bx, by, bw, 3, brickL);

  // arcaria: grandes arcos de tijolo com vidro escuro (fachada dos 3 arcos)
  const nArc = 5, gap = 6;
  const arcW = Math.floor((bw - gap) / nArc) - gap;
  const oy = by + 16, oh = bh - 26;
  for (let i = 0; i < nArc; i++) {
    const ox = bx + gap + i * (arcW + gap);
    // vão de vidro escuro
    px(ox, oy + 8, arcW, oh - 8, glass);
    px(ox, oy + 8, 2, oh - 8, glassL);                 // reflexo lateral
    // topo em arco: degraus arredondando os cantos superiores
    px(ox + 3, oy + 2, arcW - 6, 6, glass);            // miolo do arco
    px(ox + 1, oy + 5, arcW - 2, 3, glass);
    px(ox + 3, oy + 2, arcW - 6, 1, glassL);           // brilho no topo do arco
  }
  // textura de argamassa horizontal só nos pilares (fora dos vãos)
  ctx.fillStyle = brickD;
  for (let y = by + 4; y < by + bh - 8; y += 6) {
    for (let i = 0; i <= nArc; i++) {
      const px0 = bx + i * (arcW + gap);
      ctx.fillRect(px0, y, gap + 1, 1);
    }
  }
  // contorno lateral
  px(bx, by, 2, bh - 4, brickD); px(bx + bw - 2, by, 2, bh - 4, brickD);

  // coroamento dourado em leque (teto radial) + brasão do Tocantins simplificado
  const ecx = bx + bw / 2, ecy = by - 2;
  // leque de raios dourados
  ctx.strokeStyle = goldD; ctx.lineWidth = 1;
  for (let a = -6; a <= 6; a++) {
    ctx.beginPath(); ctx.moveTo(ecx, ecy + 4); ctx.lineTo(ecx + a * 12, by - 4); ctx.stroke();
  }
  px(bx + 10, by - 5, bw - 20, 4, gold);        // faixa dourada do beiral
  px(bx + 10, by - 5, bw - 20, 1, '#ffe08a');

  // brasão dourado central (oval com estrela, ramos e faixa — simplificado)
  px(ecx - 8, ecy - 20, 16, 16, goldD);         // ramos de louro (moldura oval)
  px(ecx - 6, ecy - 18, 12, 14, gold);
  px(ecx - 4, ecy - 16, 8, 11, '#ffe08a');      // ovo dourado central
  px(ecx - 1, ecy - 13, 2, 6, goldD);           // detalhe interno
  drawStar(ecx, ecy - 22, 3, gold);             // estrela no topo
  px(ecx - 10, ecy - 4, 20, 3, gold);           // faixa/banner
  px(ecx - 10, ecy - 4, 20, 1, '#ffe08a');
}
