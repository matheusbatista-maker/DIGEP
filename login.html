<main>
  <div class="access-wrap">
    <div class="access-card" id="accessCard">
      <svg class="brasao-acesso" viewBox="0 0 240 240"><use href="#gRing"/><use href="#gShield"/><use href="#gScales"/><use href="#gStars"/></svg>
      <h1>Área restrita</h1>

      <form class="access-form" id="loginForm" autocomplete="off">
        <div class="access-field">
          <label for="email">E-mail institucional</label>
          <input type="email" id="email" name="email" placeholder="nome@tjto.jus.br" required autocomplete="username">
        </div>
        <div class="access-field">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="access-error" id="accessError">E-mail ou senha incorretos.</div>
        <button type="submit" class="btn">Entrar</button>
      </form>

      <a class="access-back" href="index.html">&larr; Voltar ao site</a>

  </div>
</main>

<footer>
  <strong>GABDIGEP</strong> — Gabinete da Diretoria de Gestão de Pessoas · Tribunal de Justiça do Estado do Tocantins
</footer>

<script>
// Login simples do lado do cliente — este site é 100% estático (sem backend),
// então isto é uma barreira de conveniência, não segurança real: quem inspecionar
// o código consegue ver a lógica. O hash abaixo evita só a leitura direta da senha.
const HASHES_ESPERADOS = [
  '03563d10816084978bc6c4ff45cdcae380e6b3ff7f3921b1b47480ae2dd16f53',
  'd2cac0feeab8f86244a5e9dc418f4d03d91e50ed5486da13db7af215a85ac261'
];

async function sha256Hex(texto) {
  const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(texto));
  return Array.from(new Uint8Array(buffer)).map((b) => b.toString(16).padStart(2, '0')).join('');
}

if (sessionStorage.getItem('digepAdminAuth') === '1') {
  location.replace('admin.html');
}

const form = document.getElementById('loginForm');
const card = document.getElementById('accessCard');
const erro = document.getElementById('accessError');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const senha = document.getElementById('senha').value;
  const hash = await sha256Hex(`${email}:${senha}`);

  if (HASHES_ESPERADOS.includes(hash)) {
    sessionStorage.setItem('digepAdminAuth', '1');
    sessionStorage.setItem('digepAdminUser', email);
    location.href = 'admin.html';
  } else {
    erro.classList.add('show');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    document.getElementById('senha').value = '';
    document.getElementById('senha').focus();
  }
});
</script>
