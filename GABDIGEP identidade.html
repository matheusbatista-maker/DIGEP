document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <path d=\"M100 76 L102 81 L107 82 L102 84 L100 89 L98 84 L93 82 L98 81 Z\"><\u002Fpath>\n        <path d=\"M120 71 L123 78 L130 79 L123 81 L120 88 L117 81 L110 79 L117 78 Z\"><\u002Fpath>\n        <path d=\"M140 76 L142 81 L147 82 L142 84 L140 89 L138 84 L133 82 L138 81 Z\"><\u002Fpath>\n      <\u002Fg>\n\n      <!-- Crown ornament -->\n      <g id=\"gCrown\" transform=\"translate(0 -4)\" stroke=\"#0C1A33\" stroke-width=\"2\" stroke-linejoin=\"round\">\n        <path d=\"M102 90 L102 74 L112 82 L120 70 L128 82 L138 74 L138 90 Z\" fill=\"#E3B23C\"><\u002Fpath>\n        <rect x=\"101\" y=\"88\" width=\"38\" height=\"6\" fill=\"#B4831F\"><\u002Frect>\n        <circle cx=\"102\" cy=\"73\" r=\"2.8\" fill=\"#E3B23C\"><\u002Fcircle>\n        <circle cx=\"120\" cy=\"69\" r=\"3\" fill=\"#E3B23C\"><\u002Fcircle>\n        <circle cx=\"138\" cy=\"73\" r=\"2.8\" fill=\"#E3B23C\"><\u002Fcircle>\n      <\u002Fg>\n\n      <!-- Bottom scroll (for no-ring use) -->\n      <g id=\"gScroll\" stroke=\"#0C1A33\" stroke-width=\"2.4\" stroke-linejoin=\"round\">\n        <path d=\"M46 190 L26 183 L36 197 L26 211 L46 204 Z\" fill=\"#B4831F\"><\u002Fpath>\n        <path d=\"M194 190 L214 183 L204 197 L214 211 L194 204 Z\" fill=\"#B4831F\"><\u002Fpath>\n        <path d=\"M46 187 H194 V207 L120 216 L46 207 Z\" fill=\"#E3B23C\"><\u002Fpath>\n        <text x=\"120\" y=\"205\" font-family=\"Oswald, sans-serif\" font-weight=\"700\" font-size=\"20\" letter-spacing=\"1.5\" text-anchor=\"middle\" fill=\"#0C1A33\" stroke=\"none\">GABDIGEP<\u002Ftext>\n      <\u002Fg>\n    <\u002Fdefs>\n  <\u002Fsvg>\n\n  <!-- ===================== HEADER ===================== -->\n  <div style=\"background:#0C1A33;color:#F4ECD6;padding:34px 40px 30px;border-bottom:5px solid #E3B23C;\">\n    <div style=\"max-width:1120px;margin:0 auto;display:flex;align-items:center;gap:26px;flex-wrap:wrap;\">\n      <svg sc-camel-view-box=\"0 0 240 240\" style=\"width:92px;height:auto;flex:none;\">\n        <use href=\"#gRing\"><\u002Fuse><use href=\"#gShield\"><\u002Fuse><use href=\"#gScales\"><\u002Fuse><use href=\"#gStars\"><\u002Fuse>\n      <\u002Fsvg>\n      <div>\n        <div style=\"font-family:'Oswald',sans-serif;letter-spacing:3px;color:#E3B23C;font-weight:600;font-size:13px;\">IDENTIDADE VISUAL · DIGEP POR DENTRO<\u002Fdiv>\n        <h1 style=\"font-family:'Cinzel',serif;font-weight:700;font-size:34px;margin:4px 0 6px;line-height:1;\">Brasão GABDIGEP<\u002Fh1>\n        <p style=\"margin:0;max-width:640px;color:#c9d3e4;font-size:15px;line-height:1.5;\">Gabinete da Diretoria de Gestão de Pessoas — emblema no estilo escudo de futebol: badge circular, anel de texto e escudo central com o símbolo da equipe.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 40px;\">\n\n    <!-- ===================== MAIN COMPARISON ===================== -->\n    <h2 style=\"font-family:'Cinzel',serif;font-size:22px;margin:40px 0 4px;color:#0C1A33;\">As duas versões, lado a lado<\u002Fh2>\n    <p style=\"margin:0 0 22px;color:#5a5647;font-size:14px;\">Mesmo badge, mesma equipe, mesmo anel — uma refinada, a outra pixelizada. As três estrelas representam os membros do GABDIGEP.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n      <div style=\"border:2px solid #0C1A33;border-radius:10px;overflow:hidden;background:#fff;\">\n        <div style=\"background:#0C1A33;color:#F4ECD6;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:1px;padding:11px 18px;font-size:14px;\">VERSÃO DETALHADA · VETORIAL / FLAT<\u002Fdiv>\n        <div class=\"checker\" style=\"padding:34px;display:flex;justify-content:center;align-items:center;min-height:320px;\">\n          <svg sc-camel-view-box=\"0 0 240 240\" style=\"width:290px;height:auto;filter:drop-shadow(0 6px 14px rgba(12,26,51,.25));\">\n            <sc-if value=\"{{ring}}\" hint-placeholder-val=\"{{true}}\"><use href=\"#gRing\"><\u002Fuse><\u002Fsc-if>\n            <use href=\"#gShield\"><\u002Fuse><use href=\"#gScales\"><\u002Fuse>\n            <sc-if value=\"{{showStars}}\" hint-placeholder-val=\"{{true}}\"><use href=\"#gStars\"><\u002Fuse><\u002Fsc-if>\n            <sc-if value=\"{{showCrown}}\"><use href=\"#gCrown\"><\u002Fuse><\u002Fsc-if>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"padding:12px 18px;font-size:12.5px;color:#5a5647;border-top:1px solid #e6dfce;\">Fundo transparente · contorno limpo · para site, papel timbrado e apresentações.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border:2px solid #0C1A33;border-radius:10px;overflow:hidden;background:#fff;\">\n        <div style=\"background:#0C1A33;color:#F4ECD6;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:1px;padding:11px 18px;font-size:14px;\">VERSÃO 8-BIT · PIXEL ART<\u002Fdiv>\n        <div style=\"padding:34px;display:flex;justify-content:center;align-items:center;min-height:320px;background:#132444;background-image:linear-gradient(#1a2f56 1px,transparent 1px),linear-gradient(90deg,#1a2f56 1px,transparent 1px);background-size:16px 16px;\">\n          <canvas id=\"pixelCanvas\" style=\"width:290px;max-width:100%;height:auto;\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div style=\"padding:12px 18px;font-size:12.5px;color:#5a5647;border-top:1px solid #e6dfce;\">Blocos chapados · grade visível · para o mini game (brasão &lt; 64×64 px).<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===================== LEGIBILITY TEST ===================== -->\n    <h2 style=\"font-family:'Cinzel',serif;font-size:22px;margin:44px 0 4px;color:#0C1A33;\">Teste de legibilidade reduzida<\u002Fh2>\n    <p style=\"margin:0 0 22px;color:#5a5647;font-size:14px;\">A silhueta continua dizendo “escudo com equipe” mesmo em miniatura.<\u002Fp>\n    <div style=\"border:2px solid #0C1A33;border-radius:10px;background:#fff;padding:28px 34px;display:flex;align-items:flex-end;gap:48px;flex-wrap:wrap;\">\n      <div style=\"text-align:center;\"><svg sc-camel-view-box=\"0 0 240 240\" style=\"width:132px;height:auto;\"><use href=\"#gRing\"><\u002Fuse><use href=\"#gShield\"><\u002Fuse><use href=\"#gScales\"><\u002Fuse><use href=\"#gStars\"><\u002Fuse><\u002Fsvg><div style=\"font-size:12px;color:#8a8471;margin-top:8px;font-family:'Oswald';letter-spacing:1px;\">132 px<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center;\"><svg sc-camel-view-box=\"0 0 240 240\" style=\"width:64px;height:auto;\"><use href=\"#gRing\"><\u002Fuse><use href=\"#gShield\"><\u002Fuse><use href=\"#gScales\"><\u002Fuse><use href=\"#gStars\"><\u002Fuse><\u002Fsvg><div style=\"font-size:12px;color:#8a8471;margin-top:8px;font-family:'Oswald';letter-spacing:1px;\">64 px<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center;\"><svg sc-camel-view-box=\"0 0 240 240\" style=\"width:32px;height:auto;\"><use href=\"#gRing\"><\u002Fuse><use href=\"#gShield\"><\u002Fuse><use href=\"#gScales\"><\u002Fuse><\u002Fsvg><div style=\"font-size:12px;color:#8a8471;margin-top:8px;font-family:'Oswald';letter-spacing:1px;\">32 px<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center;\"><svg sc-camel-view-box=\"40 48 160 150\" style=\"width:32px;height:auto;\"><use href=\"#gShield\"><\u002Fuse><use href=\"#gScales\"><\u002Fuse><\u002Fsvg><div style=\"font-size:12px;color:#8a8471;margin-top:8px;font-family:'Oswald';letter-spacing:1px;\">32 px · só escudo<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===================== VARIATIONS ===================== -->\n    <h2 style=\"font-family:'Cinzel',serif;font-size:22px;margin:44px 0 4px;color:#0C1A33;\">Variações<\u002Fh2>\n    <p style=\"margin:0 0 22px;color:#5a5647;font-size:14px;\">Só o escudo, com faixa, e versão monocromática para carimbo / marca d’água.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:20px;\">\n      <div style=\"border:2px solid #0C1A33;border-radius:10px;background:#fff;overflow:hidden;\">\n        <div class=\"checker\" style=\"padding:24px;display:flex;justify-content:center;min-height:160px;align-items:center;\">\n          <svg sc-camel-view-box=\"50 50 140 150\" style=\"width:120px;height:auto;\"><use href=\"#gShield\"><\u002Fuse><use href=\"#gScales\"><\u002Fuse><use href=\"#gStars\"><\u002Fuse><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"padding:10px 14px;font-size:12.5px;font-family:'Oswald';letter-spacing:.5px;color:#0C1A33;border-top:1px solid #e6dfce;\">Só o escudo (sem anel)<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:2px solid #0C1A33;border-radius:10px;background:#fff;overflow:hidden;\">\n        <div class=\"checker\" style=\"padding:24px;display:flex;justify-content:center;min-height:160px;align-items:center;\">\n          <svg sc-camel-view-box=\"20 50 200 175\" style=\"width:130px;height:auto;\"><use href=\"#gShield\"><\u002Fuse><use href=\"#gScales\"><\u002Fuse><use href=\"#gStars\"><\u002Fuse><use href=\"#gScroll\"><\u002Fuse><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"padding:10px 14px;font-size:12.5px;font-family:'Oswald';letter-spacing:.5px;color:#0C1A33;border-top:1px solid #e6dfce;\">Escudo com faixa<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:2px solid #0C1A33;border-radius:10px;background:#fff;overflow:hidden;\">\n        <div class=\"checker\" style=\"padding:24px;display:flex;justify-content:center;min-height:160px;align-items:center;\">\n          <svg sc-camel-view-box=\"0 0 240 240\" style=\"width:130px;height:auto;filter:grayscale(1) contrast(1.05) sepia(1) hue-rotate(178deg) saturate(3.2) brightness(.8);\"><use href=\"#gRing\"><\u002Fuse><use href=\"#gShield\"><\u002Fuse><use href=\"#gScales\"><\u002Fuse><use href=\"#gStars\"><\u002Fuse><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"padding:10px 14px;font-size:12.5px;font-family:'Oswald';letter-spacing:.5px;color:#0C1A33;border-top:1px solid #e6dfce;\">Mono · azul (claro)<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:2px solid #0C1A33;border-radius:10px;background:#0C1A33;overflow:hidden;\">\n        <div style=\"padding:24px;display:flex;justify-content:center;min-height:160px;align-items:center;\">\n          <svg sc-camel-view-box=\"0 0 240 240\" style=\"width:130px;height:auto;filter:grayscale(1) brightness(1.7) contrast(1.2);\"><use href=\"#gRing\"><\u002Fuse><use href=\"#gShield\"><\u002Fuse><use href=\"#gScales\"><\u002Fuse><use href=\"#gStars\"><\u002Fuse><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"padding:10px 14px;font-size:12.5px;font-family:'Oswald';letter-spacing:.5px;color:#F4ECD6;border-top:1px solid #26385c;\">Mono · claro (fundo escuro)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===================== PALETTE ===================== -->\n    <h2 style=\"font-family:'Cinzel',serif;font-size:22px;margin:44px 0 14px;color:#0C1A33;\">Paleta — 5 cores chapadas<\u002Fh2>\n    <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n      <sc-for list=\"{{ palette }}\" as=\"c\" hint-placeholder-count=\"5\">\n        <div style=\"width:150px;border:1.5px solid #d8d0bd;border-radius:8px;overflow:hidden;background:#fff;\">\n          <div style=\"height:64px;background:{{ c.hex }};\"><\u002Fdiv>\n          <div style=\"padding:8px 10px;\">\n            <div style=\"font-family:'Oswald';font-size:13px;color:#0C1A33;\">{{ c.name }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#8a8471;font-family:monospace;\">{{ c.hex }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1160,&quot;height&quot;:900},&quot;ring&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Emblema&quot;},&quot;ornament&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;stars&quot;,&quot;crown&quot;,&quot;none&quot;],&quot;default&quot;:&quot;stars&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Emblema&quot;},&quot;pixelGrid&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Pixel art&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount(){ this._raf = requestAnimationFrame(()=>this.buildPixel()); }\n  componentDidUpdate(){ this.buildPixel(); }\n  componentWillUnmount(){ if(this._raf) cancelAnimationFrame(this._raf); }\n\n  renderVals(){\n    const orn = this.props.ornament ?? 'stars';\n    return {\n      ring: this.props.ring ?? true,\n      showStars: orn === 'stars',\n      showCrown: orn === 'crown',\n      palette: [\n        {name:'Marinho profundo', hex:'#0C1A33'},\n        {name:'Azul institucional', hex:'#1E3A64'},\n        {name:'Dourado', hex:'#E3B23C'},\n        {name:'Dourado escuro', hex:'#B4831F'},\n        {name:'Creme', hex:'#F4ECD6'},\n      ],\n    };\n  }\n\n  buildPixel(){\n    const ids = [];\n    if (this.props.ring ?? true) ids.push('gRing');\n    ids.push('gShield','gScales');\n    const orn = this.props.ornament ?? 'stars';\n    if (orn === 'stars') ids.push('gStars'); else if (orn === 'crown') ids.push('gCrown');\n    const arcT = document.getElementById('arcTop');\n    const arcB = document.getElementById('arcBot');\n    const defs = (arcT ? arcT.outerHTML : '') + (arcB ? arcB.outerHTML : '');\n    const inner = ids.map(id => { const e = document.getElementById(id); return e ? e.outerHTML : ''; }).join('');\n    const svg = `<svg xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" viewBox=\"0 0 240 240\" width=\"240\" height=\"240\"><defs>${defs}<\u002Fdefs>${inner}<\u002Fsvg>`;\n    const img = new Image();\n    img.onload = () => this.drawPixels(img);\n    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);\n  }\n\n  drawPixels(img){\n    const cvs = document.getElementById('pixelCanvas');\n    if(!cvs) return;\n    const W = 62, H = 62;\n    const off = document.createElement('canvas'); off.width = W; off.height = H;\n    const octx = off.getContext('2d');\n    octx.clearRect(0,0,W,H);\n    octx.drawImage(img,0,0,W,H);\n    const data = octx.getImageData(0,0,W,H).data;\n    const pal = [[12,26,51],[30,58,100],[227,178,60],[180,131,31],[244,236,214]];\n    const cell = 8, gap = (this.props.pixelGrid ?? true) ? 1 : 0;\n    cvs.width = W*cell; cvs.height = H*cell;\n    const ctx = cvs.getContext('2d');\n    ctx.clearRect(0,0,cvs.width,cvs.height);\n    for(let y=0;y<H;y++) for(let x=0;x<W;x++){\n      const i=(y*W+x)*4, a=data[i+3];\n      if(a<110) continue;\n      const r=data[i],g=data[i+1],b=data[i+2];\n      let best=0,bd=1e9;\n      for(let p=0;p<pal.length;p++){const dr=r-pal[p][0],dg=g-pal[p][1],db=b-pal[p][2];const d=dr*dr+dg*dg+db*db;if(d<bd){bd=d;best=p;}}\n      const c=pal[best];\n      ctx.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`;\n      ctx.fillRect(x*cell,y*cell,cell-gap,cell-gap);\n    }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
